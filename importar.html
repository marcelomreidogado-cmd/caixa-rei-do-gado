async function fbSet(path, obj) {
  var r = await fetch(DB+'/'+path+'.json', {
    method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify(obj)
  });
  if(!r.ok) throw new Error(r.status);
}

function log(msg) { document.getElementById('log').textContent += msg+'\n'; }

async function runImport() {
  document.getElementById('btn').disabled = true;
  document.getElementById('log').textContent = '';
  var total = 0, errors = 0;
  for (var loja of ['coronel','bingen','correas']) {
    var recs = DATA[loja];
    var ids = Object.keys(recs);
    log('Importando Caixa ' + loja + ': ' + ids.length + ' registros...');
    for (var id of ids) {
      try {
        await fbSet('caixa/'+loja+'/'+id, recs[id]);
        total++;
      } catch(e) { errors++; log('  ERRO: '+id+' — '+e.message); }
    }
    log('  ✅ '+loja+' concluído');
  }
  log('\n🎉 Importação finalizada!');
  log('Total importado: '+total+' registros');
  if(errors) log('Erros: '+errors);
  document.getElementById('btn').textContent = '✅ Concluído';
}
</script>
