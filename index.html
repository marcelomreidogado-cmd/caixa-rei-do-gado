<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Caixa Rei do Gado</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F5F4F0;--s:#fff;--b:#E4E3DC;--tx:#1C1C1A;--mu:#72726A;
  --r:10px;--sh:0 1px 4px rgba(0,0,0,.08);--shlg:0 8px 32px rgba(0,0,0,.16);
  --danger:#DC2626;--warn:#D97706;--ok:#0F9E65;
  --ac:#52525B;--acbg:#F0EFEA;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--tx);font-size:14px;line-height:1.5;display:flex;height:100vh;overflow:hidden}

/* ── SIDEBAR ── */
.sb{width:224px;min-width:224px;background:#18181B;display:flex;flex-direction:column;height:100vh;overflow-y:auto}
.sb-logo{padding:18px 16px 14px;border-bottom:1px solid #27272A}
.sb-logo-row{display:flex;align-items:center;gap:10px}
.sb-icon{width:34px;height:34px;background:var(--ac);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;transition:background .2s}
.sb-name{font-size:15px;font-weight:700;color:#fff}
.sb-sub{font-size:10px;color:#52525B;margin-top:4px;margin-left:44px;text-transform:uppercase;letter-spacing:.08em}
.sb-sec{padding:14px 10px 4px}
.sb-lbl{font-size:10px;font-weight:600;color:#3F3F46;text-transform:uppercase;letter-spacing:.1em;padding:0 8px;margin-bottom:6px}
.nb{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:7px;cursor:pointer;color:#A1A1AA;font-size:13.5px;font-weight:500;border:none;background:none;width:100%;text-align:left;font-family:inherit;transition:all .15s}
.nb:hover{background:#27272A;color:#E4E4E7}
.nb.on{background:var(--acbg);color:var(--ac)}
.ni{font-size:15px;width:20px;text-align:center;flex-shrink:0}
.sb-foot{margin-top:auto;padding:14px 16px;border-top:1px solid #27272A;font-size:11px;color:#3F3F46;line-height:1.6}

/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{background:#fff;border-bottom:1px solid var(--b);padding:0 24px;height:52px;display:flex;align-items:center;flex-shrink:0;box-shadow:var(--sh)}
.topbar-title{font-size:15px;font-weight:600}
.snav{background:#fff;border-bottom:1px solid var(--b);padding:0 20px;display:flex;flex-shrink:0}
.snb{padding:12px 16px;font-size:13px;font-weight:500;color:var(--mu);cursor:pointer;border:none;border-bottom:2.5px solid transparent;background:none;font-family:inherit;transition:all .15s;white-space:nowrap}
.snb:hover{color:var(--tx)}
.snb.on{color:var(--ac);border-bottom-color:var(--ac)}
.content{flex:1;overflow-y:auto;padding:24px}

/* ── MONTH BAR ── */
.mbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;width:100%;padding:8px 0}
.mbar-year{display:flex;align-items:center;gap:6px;margin-right:6px;background:#fff;border:1.5px solid var(--b);border-radius:10px;padding:4px 6px;box-shadow:var(--sh)}
.mbar-year button{width:28px;height:28px;border:none;background:var(--bg);border-radius:7px;cursor:pointer;font-size:16px;color:var(--mu);font-family:inherit;font-weight:700;transition:all .12s}
.mbar-year button:hover{background:var(--acbg);color:var(--ac)}
.mbar-year span{min-width:48px;text-align:center;font-size:13px;font-weight:800;color:var(--tx)}
.mbar-months{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.mbar-month{padding:8px 12px;border:1.5px solid var(--b);border-radius:9px;background:#fff;color:var(--tx);font-size:12.5px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .12s;box-shadow:var(--sh)}
.mbar-month:hover{border-color:var(--ac);color:var(--ac);background:var(--acbg)}
.mbar-month.active{background:var(--ac);border-color:var(--ac);color:#fff;box-shadow:0 2px 10px rgba(0,0,0,.12)}
.mbar-title{font-size:12px;font-weight:800;color:var(--mu);text-transform:uppercase;letter-spacing:.06em;margin-right:4px}

/* ── CARD ── */
.card{background:#fff;border-radius:var(--r);border:1px solid var(--b);overflow:hidden;box-shadow:var(--sh)}
.ch{padding:14px 20px;border-bottom:1px solid var(--b);display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.ct{font-weight:600;font-size:14px}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;border:none;font-family:inherit;transition:all .15s}
.btn-p{background:var(--ac);color:#fff}
.btn-p:hover{filter:brightness(1.1)}
.btn-o{background:#fff;color:var(--mu);border:1.5px solid var(--b)}
.btn-o:hover{border-color:var(--ac);color:var(--ac)}
.btn-sm{padding:5px 12px;font-size:12px}
.bico{padding:5px 8px;border-radius:6px;font-size:13px;background:transparent;border:1.5px solid var(--b);cursor:pointer;transition:all .12s;font-family:inherit}
.bico:hover{background:var(--bg)}
.bico.del:hover{background:#FFF0F0;border-color:#FECACA}

/* ── TABLE ── */
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse;min-width:1220px;border-left:1px solid var(--b);border-top:1px solid var(--b)}
thead th{background:#FAFAF8;padding:9px 12px;text-align:left;font-size:11px;font-weight:800;color:#3F3F46;text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--b);border-right:1px solid var(--b);white-space:nowrap}
thead th.r{text-align:right}
tbody td{padding:10px 12px;border-bottom:1px solid #F0EFE8;border-right:1px solid #E9E8E1;font-size:13px;white-space:nowrap;vertical-align:middle}
tbody tr{cursor:pointer;transition:background .1s}
tbody tr:hover td{filter:brightness(.96)}
tbody tr.sel td{background:var(--acbg)!important;box-shadow:inset 0 1px 0 rgba(0,0,0,.03), inset 0 -1px 0 rgba(0,0,0,.03)}
tbody tr.sel td:first-child{border-left:5px solid var(--ac)}
tbody tr.sel td:nth-child(2){font-weight:800;color:var(--ac)}
tbody tr:not(.sel) td:first-child{border-left:5px solid transparent}
tbody tr:last-child td{border-bottom:none}
tbody tr.pago-row{background:#F0FFF6}
tbody tr.pend-row{background:#FFF5F5}
.r{text-align:right;font-family:'DM Mono',monospace;font-size:12.5px}
.fw{font-weight:600}
tfoot td{background:var(--acbg);font-weight:800;font-family:'DM Mono',monospace;font-size:12.5px;padding:9px 12px;border-top:2px solid var(--ac);border-right:1px solid var(--b)}

/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.bpg{background:#DCFCE7;color:#15803D}
.bpd{background:#FEE2E2;color:#DC2626}

/* ── FILTERS ── */
.fx{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.fsel,.finp{padding:7px 11px;border:1.5px solid var(--b);border-radius:7px;font-size:13px;color:var(--tx);background:#fff;font-family:inherit}

/* ── STATS ── */
.sg{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:12px;margin-bottom:20px}
.st{background:#fff;border:1px solid var(--b);border-radius:var(--r);padding:14px 16px}
.st-l{font-size:11px;color:var(--mu);font-weight:500;margin-bottom:4px}
.st-v{font-family:'DM Mono',monospace;font-size:19px;font-weight:700}
.st-v.ac{color:var(--ac)}
.st-s{font-size:11px;color:var(--mu);margin-top:2px}

/* ── STORE CARDS ── */
.sc-g{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:20px}
.sc{background:#fff;border:1px solid var(--b);border-radius:var(--r);overflow:hidden}
.sc-h{padding:12px 16px;font-weight:700;font-size:13.5px;color:#fff;display:flex;align-items:center;gap:8px}
.sc-b{padding:14px 16px}
.sc-r{display:flex;justify-content:space-between;padding:5px 0;font-size:13px;border-bottom:1px solid #F5F4F0}
.sc-r:last-child{border-bottom:none}
.sc-tot{display:flex;justify-content:space-between;padding:10px 0 0;font-weight:700;font-size:15px;border-top:2px solid;margin-top:8px}
@media(max-width:800px){.sc-g{grid-template-columns:1fr}}

/* ── PIX BAR ── */
.pxbar{padding:10px 16px;background:#FAFAF8;border-bottom:1px solid var(--b);display:flex;gap:20px;font-size:13px;align-items:center}

/* ── MODAL ── */
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;align-items:center;justify-content:center;padding:16px}
.ov.open{display:flex}
.modal{background:#fff;border-radius:14px;width:100%;max-width:780px;max-height:92vh;overflow-y:auto;box-shadow:var(--shlg)}
.msm{max-width:460px}
.mh{padding:18px 24px;border-bottom:1px solid var(--b);display:flex;align-items:center;justify-content:space-between}
.mt2{font-weight:600;font-size:15px}
.mb2{padding:22px 24px}
.mf{padding:14px 24px;border-top:1px solid var(--b);display:flex;justify-content:flex-end;gap:8px}

/* ── FORM ── */
.fg{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px}
.fi{display:flex;flex-direction:column;gap:4px}
.fi.full{grid-column:1/-1}
.lbl{font-size:11.5px;font-weight:600;color:var(--mu);letter-spacing:.03em}
.inp{padding:8px 11px;border:1.5px solid var(--b);border-radius:7px;font-size:13px;color:var(--tx);font-family:inherit;background:#fff;transition:border-color .15s;width:100%}
.inp:focus{outline:none;border-color:var(--ac)}
textarea.inp{resize:vertical;min-height:56px}
.fsec{grid-column:1/-1;margin-top:8px}
.fsec-t{font-size:10.5px;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:.08em;padding-bottom:8px;border-bottom:1px solid var(--b)}

/* ── MISC ── */
.loading{display:flex;align-items:center;justify-content:center;padding:56px;color:var(--mu);gap:8px;font-size:13px}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:56px;gap:10px;color:var(--mu)}
.mb5{margin-bottom:20px}
</style>
</head>
<body>

<!-- SIDEBAR -->
<aside class="sb">
  <div class="sb-logo">
    <div class="sb-logo-row"><div class="sb-icon" id="sb-icon">🐄</div><span class="sb-name">Rei do Gado</span></div>
    <div class="sb-sub">Controle de Caixa</div>
  </div>
  <div class="sb-sec">
    <div class="sb-lbl">Geral</div>
    <button class="nb on" id="nav-visao" onclick="goTo('visao')"><span class="ni">🏠</span>Visão Geral</button>
  </div>
  <div class="sb-sec">
    <div class="sb-lbl">Lojas</div>
    <button class="nb" id="nav-coronel" onclick="goTo('coronel')"><span class="ni">🟡</span>Caixa Coronel</button>
    <button class="nb" id="nav-correas" onclick="goTo('correas')"><span class="ni">🔵</span>Caixa Correas</button>
    <button class="nb" id="nav-bingen" onclick="goTo('bingen')"><span class="ni">🟢</span>Caixa Bingen</button>
  </div>
  <div class="sb-foot">Salvo em tempo real<br>Firebase REST API</div>
</aside>

<!-- MAIN -->
<div class="main">
  <div class="topbar"><span class="topbar-title" id="top-title">🏠 Visão Geral</span><span id="fb-status" style="margin-left:auto;font-size:12px;color:var(--mu)">Firebase: verificando...</span></div>
  <nav class="snav" id="snav" style="display:none"></nav>
  <div class="content" id="MC"><div class="loading">⏳ Carregando...</div></div>
</div>

<!-- MODAL CAIXA -->
<div class="ov" id="m-caixa">
<div class="modal">
  <div class="mh"><span class="mt2" id="mc-title">Novo Lançamento</span><button class="btn btn-o btn-sm" onclick="cm('m-caixa')">✕ Fechar</button></div>
  <div class="mb2"><div class="fg">
    <div class="fi"><label class="lbl">Data *</label><input class="inp" type="date" id="f-data"></div>
    <div class="fi"><label class="lbl">Responsável</label><input class="inp" type="text" id="f-resp"></div>
    <div class="fi"><label class="lbl">Abertura R$</label><input class="inp" type="number" id="f-ab" step=".01" placeholder="0,00"></div>
    <div class="fsec full"><div class="fsec-t">💰 Vendas</div></div>
    <div class="fi"><label class="lbl">PIX / Transferência R$</label><input class="inp" type="number" id="f-pix" step=".01" placeholder="0,00"></div>
    <div class="fi"><label class="lbl">Dinheiro R$</label><input class="inp" type="number" id="f-din" step=".01" placeholder="0,00"></div>
    <div class="fsec full"><div class="fsec-t">💳 Rede</div></div>
    <div class="fi"><label class="lbl">Crédito R$</label><input class="inp" type="number" id="f-rcred" step=".01" placeholder="0,00"></div>
    <div class="fi"><label class="lbl">Débito R$</label><input class="inp" type="number" id="f-rdeb" step=".01" placeholder="0,00"></div>
    <div class="fi"><label class="lbl">Parcelado R$</label><input class="inp" type="number" id="f-rpar" step=".01" placeholder="0,00"></div>
    <div class="fi"><label class="lbl">Alimentação e Refeição R$</label><input class="inp" type="number" id="f-alim" step=".01" placeholder="0,00"></div>
    <div class="fi"><label class="lbl">Nota Fácil R$</label><input class="inp" type="number" id="f-nf" step=".01" placeholder="0,00"></div>
    <div class="fsec full"><div class="fsec-t">🛵 Saídas</div></div>
    <div class="fi"><label class="lbl">Pgto Motoboy R$</label><input class="inp" type="number" id="f-moto" step=".01" placeholder="0,00"></div>
    <div class="fi"><label class="lbl">Saídas Dinheiro R$</label><input class="inp" type="number" id="f-said" step=".01" placeholder="0,00"></div>
    <div class="fi"><label class="lbl">Retirada Troco R$</label><input class="inp" type="number" id="f-troco" step=".01" placeholder="0,00"></div>
    <div class="fi"><label class="lbl">Fechamento Caixa R$</label><input class="inp" type="number" id="f-fech" step=".01" placeholder="0,00"></div>
    <div class="fi"><label class="lbl">Retirada Dinheiro R$</label><input class="inp" type="number" id="f-ret" step=".01" placeholder="0,00"></div>
    <div class="fi full"><label class="lbl">Observações</label><textarea class="inp" id="f-obs"></textarea></div>
  </div></div>
  <div class="mf"><button class="btn btn-o" onclick="cm('m-caixa')">Cancelar</button><button class="btn btn-p" onclick="saveCaixa()">💾 Salvar</button></div>
</div></div>

<!-- MODAL PIX -->
<div class="ov" id="m-pix">
<div class="modal" style="max-width:520px">
  <div class="mh"><span class="mt2" id="mp-title">Novo PIX</span><button class="btn btn-o btn-sm" onclick="cm('m-pix')">✕ Fechar</button></div>
  <div class="mb2"><div class="fg">
    <div class="fi"><label class="lbl">Data Compra *</label><input class="inp" type="date" id="fp-data"></div>
    <div class="fi"><label class="lbl">Cliente *</label><input class="inp" type="text" id="fp-cli"></div>
    <div class="fi"><label class="lbl">Valor R$ *</label><input class="inp" type="number" id="fp-val" step=".01" placeholder="0,00"></div>
    <div class="fi"><label class="lbl">Status</label>
      <select class="inp" id="fp-st"><option value="pendente">⏳ Pendente</option><option value="pago">✅ Pago</option></select>

  </div></div>
  <div class="mf"><button class="btn btn-o" onclick="cm('m-pix')">Cancelar</button><button class="btn btn-p" onclick="savePix()">💾 Salvar</button></div>
</div></div>

<!-- MODAL BAIXA -->
<div class="ov" id="m-baixa">
<div class="modal msm">
  <div class="mh">
    <div><div class="mt2">✅ Dar Baixa</div><div id="baixa-info" style="font-size:12px;color:var(--mu);margin-top:2px"></div></div>
    <button class="btn btn-o btn-sm" onclick="cm('m-baixa')">✕</button>
  </div>
  <div class="mb2"><div class="fg">
    <div class="fi"><label class="lbl">Data Pagamento *</label><input class="inp" type="date" id="bx-dtpg"></div>
    <div class="fi"><label class="lbl">Forma Pagamento</label><input class="inp" type="text" id="bx-forma" placeholder="PIX, Dinheiro..."></div>
    <div class="fi full"><label class="lbl">Observação</label><textarea class="inp" id="bx-obs" rows="2"></textarea></div>
  </div></div>
  <div class="mf">
    <button class="btn btn-o" onclick="cm('m-baixa')">Cancelar</button>
    <button class="btn btn-p" style="background:var(--ok)" onclick="confirmarBaixa()">✅ Confirmar Baixa</button>
  </div>
</div></div>

<!-- MODAL DELETE -->
<div class="ov" id="m-del">
<div class="modal msm">
  <div class="mh"><span class="mt2">⚠️ Confirmar exclusão</span><button class="btn btn-o btn-sm" onclick="cm('m-del')">✕</button></div>
  <div class="mb2"><p style="color:var(--mu)">Tem certeza? Esta ação não pode ser desfeita.</p></div>
  <div class="mf"><button class="btn btn-o" onclick="cm('m-del')">Cancelar</button><button class="btn btn-p" style="background:var(--danger)" id="btn-del">🗑️ Excluir</button></div>
</div></div>

<script>
/* ── FIREBASE REST ── */
var DB='https://motoboy-ddefa-default-rtdb.firebaseio.com';
function sf(v){try{var f=parseFloat(String(v).trim());return isNaN(f)?0:Math.round(f*100)/100;}catch(e){return 0;}}
function todayLocal(){var d=new Date();d=new Date(d.getTime()-d.getTimezoneOffset()*60000);return d.toISOString().slice(0,10);}
function monthLocal(){return todayLocal().slice(0,7);}
function setStatus(msg,type){var el=g('fb-status');if(!el)return;el.textContent=msg;el.style.color=type==='ok'?'var(--ok)':(type==='err'?'var(--danger)':'var(--mu)');}
function firebaseErrorMessage(err){
  var m=(err&&err.message)?err.message:String(err||'Erro desconhecido');
  if(m.toLowerCase().indexOf('permission')>=0||m.toLowerCase().indexOf('denied')>=0){
    return 'Permissão negada no Firebase. Verifique as Rules do Realtime Database para permitir leitura/gravação ou configure autenticação. Detalhe: '+m;
  }
  if(m.toLowerCase().indexOf('failed to fetch')>=0||m.toLowerCase().indexOf('network')>=0){
    return 'Falha de conexão com o Firebase. Verifique internet, URL do banco e se o projeto está ativo. Detalhe: '+m;
  }
  return m;
}
async function fbRequest(p,opt){
  var r,txt='',d=null,url=DB+'/'+p+'.json';
  var controller=new AbortController();
  var timer=setTimeout(function(){controller.abort();},9000);
  try{
    var cfg=opt?Object.assign({},opt):{};
    cfg.signal=controller.signal;
    r=await fetch(url,cfg);
    txt=await r.text();
    if(txt){try{d=JSON.parse(txt);}catch(e){d=txt;}}
  }catch(e){
    if(e&&e.name==='AbortError'){
      throw new Error('Tempo esgotado tentando conectar ao Firebase. Isso normalmente indica URL do banco errada, projeto Firebase indisponível, bloqueio de internet ou regra/problema no Realtime Database. Caminho testado: '+url);
    }
    throw new Error(firebaseErrorMessage(e));
  }finally{
    clearTimeout(timer);
  }
  if(d&&typeof d==='object'&&d.error){throw new Error(firebaseErrorMessage(new Error(d.error)));}
  if(!r.ok){throw new Error(firebaseErrorMessage(new Error('HTTP '+r.status+(txt?' - '+txt:''))));}
  setStatus('Firebase: conectado','ok');
  return d==null?{}:d;
}
async function fbGet(p){return fbRequest(p);}
async function fbSet(p,d){return fbRequest(p,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(d)});}
async function fbDel(p){return fbRequest(p,{method:'DELETE'});}
function fbListen(path,cb){
  function poll(){fbGet(path).then(function(d){cb(d||{});}).catch(function(err){setStatus('Firebase: erro','err');console.error('Erro Firebase em '+path,err);});}
  poll();
  var id=setInterval(poll,5000);
  return id;
}

/* ── LOJAS ── */
var LOJAS={
  coronel:{nome:'Coronel',icon:'🟡',cor:'#E07B20',bg:'#FEF3E7'},
  correas:{nome:'Correas',icon:'🔵',cor:'#2554D4',bg:'#EBF0FF'},
  bingen: {nome:'Bingen', icon:'🟢',cor:'#0F9E65',bg:'#E4F8EF'}
};
var MESES_BR=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
var MESES_FULL=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

/* ── STATE ── */
var page='visao',tab='caixa',loja=null;
var editId=null,pixTipo='loja',selRow=null,delPath=null,baixaId=null;
var timers=[],caixaCache={},pixCache={};
var mesSel=monthLocal(); // e.g. "2026-05"
var pickerYear=parseInt(mesSel.slice(0,4));

/* ── UTILS ── */
var uid=function(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);};
var fmt=function(v){return sf(v).toLocaleString('pt-BR',{style:'currency',currency:'BRL'});};
var fmtN=function(v){return sf(v).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});};
var fmtD=function(s){return s?new Date(s+'T12:00:00').toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'}):'—';};
var fmtDF=function(s){return s?new Date(s+'T12:00:00').toLocaleDateString('pt-BR'):'—';};
var weekOf=function(s){var d=new Date(s),j=new Date(d.getFullYear(),0,1);return 'S'+Math.ceil(((d-j)/864e5+j.getDay()+1)/7)+'/'+d.getFullYear().toString().slice(2);};
var calcCred=function(e){return sf(e.rcred)-sf(e.rpar);}; // Crédito líquido: parcelado diminui do crédito informado
var calcTot=function(e){return sf(e.pix)+sf(e.din)+calcCred(e)+sf(e.rdeb)+sf(e.rpar)+sf(e.alim);}; // Total Dia sem duplicar parcelado e sem Nota Fácil
var calcSis=function(e){return calcTot(e)+sf(e.nf);}; // Total Sistema = Total Dia + Nota Fácil

function mesLabel(ym){
  ym=ym||mesSel;
  var y=parseInt(ym.slice(0,4)),m=parseInt(ym.slice(5,7))-1;
  return MESES_FULL[m]+' de '+y;
}

function setAC(c,bg){
  document.documentElement.style.setProperty('--ac',c);
  document.documentElement.style.setProperty('--acbg',bg);
}
function setMC(h){document.getElementById('MC').innerHTML=h;}
function clearAll(){timers.forEach(function(t){clearInterval(t);});timers=[];selRow=null;caixaCache={};pixCache={};}
function cm(id){document.getElementById(id).classList.remove('open');}
function g(id){return document.getElementById(id);}

/* ── MONTH BAR ── */
function buildPicker(containerId, onSelect){
  var wrap=g(containerId);if(!wrap)return;
  var yr=pickerYear;
  var curM=parseInt(mesSel.slice(5,7))-1;
  var curY=parseInt(mesSel.slice(0,4));
  wrap.innerHTML='<div class="mbar">'
    +'<span class="mbar-title">Mês</span>'
    +'<div class="mbar-year">'
    +'<button title="Ano anterior" onclick="changePickerYear(-1,\''+containerId+'\',\''+onSelect+'\')">‹</button>'
    +'<span>'+yr+'</span>'
    +'<button title="Próximo ano" onclick="changePickerYear(1,\''+containerId+'\',\''+onSelect+'\')">›</button>'
    +'</div>'
    +'<div class="mbar-months">'+MESES_BR.map(function(m,i){
      var val=yr+'-'+(i+1<10?'0':'')+(i+1);
      var active=(yr===curY&&i===curM)?' active':'';
      return '<button class="mbar-month'+active+'" onclick="selectMes(\''+val+'\',\''+containerId+'\',\''+onSelect+'\')">'+m+'</button>';
    }).join('')+'</div>'
    +'</div>';
}

function changePickerYear(delta,containerId,onSelect){
  pickerYear+=delta;
  buildPicker(containerId,onSelect);
}

function selectMes(val,containerId,onSelect){
  mesSel=val;
  pickerYear=parseInt(val.slice(0,4));
  if(onSelect==='buildCT') buildCT();
  else if(onSelect==='renderVisao') renderVisao();
  buildPicker(containerId,onSelect);
}

/* ── NAVEGAÇÃO ── */
function goTo(p){
  clearAll();page=p;
  document.querySelectorAll('.nb').forEach(function(b){b.classList.remove('on');});
  var el=g('nav-'+p);if(el)el.classList.add('on');
  var titles={visao:'🏠 Visão Geral',
    coronel:'🟡 Caixa Coronel',correas:'🔵 Caixa Correas',bingen:'🟢 Caixa Bingen'};
  g('top-title').textContent=titles[p]||p;
  if(p==='visao'){
    loja=null;setAC('#52525B','#F0EFEA');
    g('sb-icon').style.background='#52525B';
    g('snav').style.display='none';
    renderVisao();
  } else {
    loja=p;setAC(LOJAS[p].cor,LOJAS[p].bg);
    g('sb-icon').style.background=LOJAS[p].cor;
    tab='caixa';buildSnav();renderCaixa();
  }
}

function buildSnav(){
  var nav=g('snav');nav.style.display='flex';
  var tabs=[{id:'caixa',l:'📋 Caixa Diário'},{id:'pix_loja',l:'💸 PIX Loja'},{id:'pix_rest',l:'🍽️ PIX Restaurante'}];
  nav.innerHTML=tabs.map(function(t){return '<button class="snb'+(t.id===tab?' on':'')+'" onclick="switchTab(\''+t.id+'\')">'+t.l+'</button>';}).join('');
}

function switchTab(t){
  clearAll();tab=t;buildSnav();
  if(t==='caixa')renderCaixa();
  else if(t==='pix_loja')renderPix('loja');
  else if(t==='pix_rest')renderPix('restaurante');
}

/* ── CAIXA ── */
function renderCaixa(){
  setMC('<div class="card">'
    +'<div class="ch">'
    +'<div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap">'
    +'<span class="ct">'+LOJAS[loja].icon+' Caixa Diário — '+LOJAS[loja].nome+'</span>'
    +'<div id="picker-caixa"></div>'
    +'</div>'
    +'<button class="btn btn-p" onclick="openCaixaModal()">+ Novo Lançamento</button>'
    +'</div>'
    +'<div id="ctable"><div class="loading">⏳ Carregando...</div></div>'
    +'</div>');
  buildPicker('picker-caixa','buildCT');
  timers.push(fbListen('caixa/'+loja,function(d){caixaCache=d||{};buildCT();}));
}

function buildCT(){
  var el=g('ctable');if(!el)return;
  var rows=Object.entries(caixaCache)
    .filter(function(x){return x[1].data&&x[1].data.startsWith(mesSel);})
    .sort(function(a,b){return a[1].data.localeCompare(b[1].data);});

  if(!rows.length){
    el.innerHTML='<div class="empty"><div style="font-size:38px">📋</div><span>Nenhum lançamento em '+mesLabel()+'</span></div>';
    return;
  }

  var T={pix:0,din:0,rc:0,rd:0,rp:0,alim:0,nf:0,tot:0,sis:0,moto:0,said:0};
  var trs=rows.map(function(x){
    var id=x[0],e=x[1],tot=calcTot(e),sis=calcSis(e);
    T.pix+=sf(e.pix);T.din+=sf(e.din);T.rc+=calcCred(e);T.rd+=sf(e.rdeb);T.rp+=sf(e.rpar);
    T.alim+=sf(e.alim);T.nf+=sf(e.nf);T.tot+=tot;T.sis+=sis;T.moto+=sf(e.moto);T.said+=sf(e.said);
    var cls=selRow===id?' sel':'';
    return '<tr class="'+cls+'" onclick="selRow=\''+id+'\';buildCT()">'
      +'<td>'+fmtD(e.data)+'</td><td><strong>'+(e.resp||'—')+'</strong></td>'
      +'<td class="r">'+(sf(e.ab)?fmt(e.ab):'—')+'</td>'
      +'<td class="r">'+(sf(e.pix)?fmt(e.pix):'—')+'</td>'
      +'<td class="r">'+(sf(e.din)?fmt(e.din):'—')+'</td>'
      +'<td class="r">'+(calcCred(e)?fmt(calcCred(e)):'—')+'</td>'
      +'<td class="r">'+(sf(e.rdeb)?fmt(e.rdeb):'—')+'</td>'
      +'<td class="r">'+(sf(e.rpar)?fmt(e.rpar):'—')+'</td>'
      +'<td class="r">'+(sf(e.alim)?fmt(e.alim):'—')+'</td>'
      +'<td class="r fw">'+fmt(tot)+'</td>'
      +'<td class="r">'+(sf(e.nf)?fmt(e.nf):'—')+'</td>'
      +'<td class="r fw">'+fmt(sis)+'</td>'
      +'<td class="r" style="color:var(--warn)">'+(sf(e.moto)?fmt(e.moto):'—')+'</td>'
      +'<td class="r">'+(sf(e.said)?fmt(e.said):'—')+'</td>'
      +'<td class="r">'+(sf(e.troco)?fmt(e.troco):'—')+'</td>'
      +'<td class="r">'+(sf(e.fech)?fmt(e.fech):'—')+'</td>'
      +'<td class="r">'+(sf(e.ret)?fmt(e.ret):'—')+'</td>'
      +'<td style="max-width:130px;overflow:hidden;text-overflow:ellipsis;color:var(--mu);font-size:12px">'+(e.obs||'')+'</td>'
      +'<td style="white-space:nowrap">'
        +'<button class="bico" onclick="openCaixaModal(\''+id+'\');event.stopPropagation()">✏️</button> '
        +'<button class="bico del" onclick="openDel(\'caixa/'+loja+'/'+id+'\');event.stopPropagation()">🗑️</button>'
      +'</td></tr>';
  }).join('');

  el.innerHTML='<div class="tw"><table>'
    +'<thead><tr>'
    +'<th>Data</th><th>Resp.</th><th class="r">Abertura</th>'
    +'<th class="r">PIX/Transf.</th><th class="r">Dinheiro</th>'
    +'<th class="r">Crédito Líq.</th><th class="r">Déb.Rede</th><th class="r">Parcelado</th>'
    +'<th class="r">Alim./Refeição</th>'
    +'<th class="r">Total Dia</th><th class="r">N.Fácil</th><th class="r">Total Sist.</th>'
    +'<th class="r">Motoboy</th><th class="r">Saídas</th><th class="r">Ret.Troco</th>'
    +'<th class="r">Fechamento</th><th class="r">Ret.Din.</th>'
    +'<th>Obs.</th><th>Ações</th>'
    +'</tr></thead>'
    +'<tbody>'+trs+'</tbody>'
    +'<tfoot><tr>'
    +'<td colspan="3"><strong>TOTAL MÊS</strong></td>'
    +'<td class="r">'+fmt(T.pix)+'</td><td class="r">'+fmt(T.din)+'</td>'
    +'<td class="r">'+fmt(T.rc)+'</td><td class="r">'+fmt(T.rd)+'</td><td class="r">'+fmt(T.rp)+'</td>'
    +'<td class="r">'+fmt(T.alim)+'</td>'
    +'<td class="r fw">'+fmt(T.tot)+'</td><td class="r">'+fmt(T.nf)+'</td><td class="r fw">'+fmt(T.sis)+'</td>'
    +'<td class="r" style="color:var(--warn)">'+fmt(T.moto)+'</td><td class="r">'+fmt(T.said)+'</td>'
    +'<td colspan="5"></td>'
    +'</tr></tfoot></table></div>';
}

function openCaixaModal(id){
  editId=id||null;
  g('mc-title').textContent=id?'Editar Lançamento':'Novo Lançamento';
  var keys=['data','resp','ab','pix','din','rcred','rdeb','rpar','alim','nf','moto','said','troco','fech','ret','obs'];
  if(id&&caixaCache[id]){
    var e=caixaCache[id];
    keys.forEach(function(k){var el=g('f-'+k);if(el)el.value=(e[k]!=null&&e[k]!==0)?e[k]:'';});
  } else {
    keys.forEach(function(k){var el=g('f-'+k);if(el)el.value='';});
    g('f-data').value=todayLocal();
  }
  g('m-caixa').classList.add('open');
}

function saveCaixa(){
  if(!loja){alert('Selecione uma loja antes de lançar.');return;}
  var data=g('f-data').value;
  if(!data){alert('Data é obrigatória');return;}
  var e={data:data,resp:g('f-resp').value,
    ab:sf(g('f-ab').value),pix:sf(g('f-pix').value),din:sf(g('f-din').value),
    rcred:sf(g('f-rcred').value),rdeb:sf(g('f-rdeb').value),rpar:sf(g('f-rpar').value),
    alim:sf(g('f-alim').value),nf:sf(g('f-nf').value),
    moto:sf(g('f-moto').value),said:sf(g('f-said').value),
    troco:sf(g('f-troco').value),fech:sf(g('f-fech').value),ret:sf(g('f-ret').value),
    obs:g('f-obs').value,ts:Date.now()};
  var id=editId||uid();
  fbSet('caixa/'+loja+'/'+id,e)
    .then(function(){
      caixaCache[id]=e;selRow=id;
      if(data.slice(0,7)!==mesSel){mesSel=data.slice(0,7);pickerYear=parseInt(mesSel.slice(0,4));buildPicker('picker-caixa','buildCT');}
      buildCT();editId=null;cm('m-caixa');setStatus('Firebase: lançamento salvo','ok');
      alert('Lançamento salvo com sucesso.');
    })
    .catch(function(err){setStatus('Firebase: erro ao salvar','err');alert('Erro ao salvar: '+firebaseErrorMessage(err));});
}

/* ── PIX ── */
function renderPix(tipo){
  pixTipo=tipo;
  var label=tipo==='loja'?'💸 PIX Clientes Loja':'🍽️ PIX Clientes Restaurante';
  setMC('<div class="card">'
    +'<div class="ch"><span class="ct">'+label+' — '+LOJAS[loja].nome+'</span>'
    +'<div class="fx">'
    +'<input class="finp" type="search" id="px-srch" placeholder="🔍 Buscar cliente..." oninput="buildPT()" style="width:180px">'
    +'<select class="fsel" id="px-st" onchange="buildPT()">'
    +'<option value="">Todos</option><option value="pendente">⏳ Pendentes</option><option value="pago">✅ Pagos</option>'
    +'</select>'
    +'<button class="btn btn-p" onclick="openPixModal()">+ Novo</button>'
    +'</div></div>'
    +'<div id="pxtable"><div class="loading">⏳ Carregando...</div></div>'
    +'</div>');
  var path=tipo==='loja'?'pix_loja/'+loja:'pix_rest/'+loja;
  timers.push(fbListen(path,function(d){pixCache=d||{};buildPT();}));
}

function buildPT(){
  var srch=(g('px-srch')?g('px-srch').value:'').toLowerCase();
  var stf=g('px-st')?g('px-st').value:'';
  var hasC=pixTipo==='restaurante';
  var rows=Object.entries(pixCache).sort(function(a,b){return (b[1].data||'').localeCompare(a[1].data||'');});
  if(srch)rows=rows.filter(function(x){return x[1].cli&&x[1].cli.toLowerCase().indexOf(srch)>=0;});
  if(stf)rows=rows.filter(function(x){return x[1].status===stf;});
  var pend=0,pago=0;
  rows.forEach(function(x){if(x[1].status==='pago')pago+=sf(x[1].val);else pend+=sf(x[1].val);});
  var el=g('pxtable');if(!el)return;
  if(!rows.length){el.innerHTML='<div class="empty"><div style="font-size:38px">📭</div><span>Nenhum registro encontrado</span></div>';return;}
  var hint='<div style="padding:8px 16px;font-size:11px;color:var(--mu);background:#FAFAF8;border-bottom:1px solid var(--b)">💡 Duplo clique numa linha pendente para dar baixa rapidamente</div>';
  var trs=rows.map(function(x){
    var id=x[0],e=x[1],pg=e.status==='pago';
    var badge=pg?'<span class="badge bpg">✅ Pago</span>':'<span class="badge bpd">⏳ Pendente</span>';
    var rowCls=(selRow===id?' sel':'')+(pg?' pago-row':' pend-row');
    var path_=pixTipo==='loja'?'pix_loja/'+loja+'/'+id:'pix_rest/'+loja+'/'+id;
    return '<tr class="'+rowCls+'" onclick="selRow=\''+id+'\';buildPT()"'
      +(!pg?' ondblclick="openBaixa(\''+id+'\');event.stopPropagation()"':'')+' >'
      +'<td>'+fmtDF(e.data)+'</td>'
      +'<td><strong>'+(e.cli||'—')+'</strong></td>'
      +'<td class="r fw">'+fmt(e.val)+'</td>'
      +'<td>'+badge+'</td>'
      +'<td>'+fmtDF(e.dtpg)+'</td>'
      +'<td>'+(e.forma||'—')+'</td>'
      +(hasC?'<td style="color:var(--mu);font-size:12px">'+(e.cred||'—')+'</td>':'')
      +'<td style="max-width:160px;overflow:hidden;text-overflow:ellipsis;color:var(--mu);font-size:12px">'+(e.obs||'')+'</td>'
      +'<td style="white-space:nowrap">'
        +(!pg?'<button class="bico" style="background:#E4F8EF;border-color:#6EE7B7;font-size:12px;margin-right:4px" onclick="openBaixa(\''+id+'\');event.stopPropagation()">✅ Baixa</button>':'')
        +'<button class="bico" onclick="openPixModal(\''+id+'\');event.stopPropagation()">✏️</button> '
        +'<button class="bico del" onclick="openDel(\''+path_+'\');event.stopPropagation()">🗑️</button>'
      +'</td></tr>';
  }).join('');
  el.innerHTML='<div class="pxbar">'
    +'<span>⏳ Pendente: <strong style="color:var(--warn)">'+fmt(pend)+'</strong></span>'
    +'<span>✅ Pago: <strong style="color:var(--ok)">'+fmt(pago)+'</strong></span>'
    +'<span style="color:var(--mu)">|</span>'
    +'<span>Total: <strong>'+fmt(pend+pago)+'</strong></span>'
    +'</div>'+hint
    +'<div class="tw"><table>'
    +'<thead><tr><th>Data Compra</th><th>Cliente</th><th class="r">Valor</th><th>Status</th>'
    +'<th>Data Pgto</th><th>Forma Pgto</th>'+(hasC?'<th>Créditos</th>':'')
    +'<th>Observação</th><th>Ações</th></tr></thead>'
    +'<tbody>'+trs+'</tbody>'
    +'</table></div>';
}

function openPixModal(id){
  editId=id||null;
  g('mp-title').textContent=id?'Editar PIX':'Novo PIX';
  g('fp-cred-row').style.display=pixTipo==='restaurante'?'flex':'none';
  if(id&&pixCache[id]){
    var e=pixCache[id];
    ['data','cli','val','dtpg','forma','cred','obs'].forEach(function(k){var el=g('fp-'+k);if(el)el.value=e[k]!=null?e[k]:'';});
    g('fp-st').value=e.status||'pendente';
  } else {
    ['data','cli','val','dtpg','forma','cred','obs'].forEach(function(k){var el=g('fp-'+k);if(el)el.value='';});
    g('fp-st').value='pendente';g('fp-data').value=todayLocal();
  }
  g('m-pix').classList.add('open');
}

function savePix(){
  if(!loja){alert('Selecione uma loja antes de lançar PIX.');return;}
  var data=g('fp-data').value,cli=g('fp-cli').value,val=g('fp-val').value;
  if(!data){alert('Data da compra obrigatória');return;}
  if(!cli){alert('Cliente obrigatório');return;}if(!val){alert('Valor obrigatório');return;}
  var e={data:data,cli:cli,val:sf(val),status:g('fp-st').value,
    dtpg:g('fp-dtpg').value,forma:g('fp-forma').value,
    cred:g('fp-cred').value,obs:g('fp-obs').value,ts:Date.now()};
  var path=pixTipo==='loja'?'pix_loja/'+loja:'pix_rest/'+loja;
  var id=editId||uid();
  fbSet(path+'/'+id,e).then(function(){
    pixCache[id]=e;selRow=id;buildPT();editId=null;cm('m-pix');setStatus('Firebase: PIX salvo','ok');
    alert('PIX salvo com sucesso.');
  }).catch(function(err){setStatus('Firebase: erro ao salvar','err');alert('Erro ao salvar PIX: '+firebaseErrorMessage(err));});
}

/* ── BAIXA ── */
function openBaixa(id){
  baixaId=id;var e=pixCache[id];
  g('baixa-info').textContent=(e.cli||'—')+' — '+fmt(e.val);
  g('bx-dtpg').value=todayLocal();
  g('bx-forma').value=e.forma||'';g('bx-obs').value=e.obs||'';
  g('m-baixa').classList.add('open');
}
function confirmarBaixa(){
  if(!baixaId)return;
  var e=Object.assign({},pixCache[baixaId]);
  e.status='pago';e.dtpg=g('bx-dtpg').value;e.forma=g('bx-forma').value||e.forma||'';
  e.obs=g('bx-obs').value;e.ts=Date.now();
  var path=pixTipo==='loja'?'pix_loja/'+loja+'/'+baixaId:'pix_rest/'+loja+'/'+baixaId;
  fbSet(path,e).then(function(){pixCache[baixaId]=e;buildPT();cm('m-baixa');setStatus('Firebase: baixa salva','ok');alert('Baixa salva com sucesso.');}).catch(function(err){setStatus('Firebase: erro ao salvar','err');alert('Erro ao salvar baixa: '+firebaseErrorMessage(err));});
}

/* ── DELETE ── */
function openDel(path){
  delPath=path;
  g('btn-del').onclick=function(){
    fbDel(delPath).then(function(){
      var id=delPath.split('/').pop();
      if(delPath.indexOf('caixa/'+loja+'/')===0){delete caixaCache[id];buildCT();}
      else{delete pixCache[id];buildPT();}
      cm('m-del');setStatus('Firebase: registro excluído','ok');
    }).catch(function(err){setStatus('Firebase: erro ao excluir','err');alert('Erro ao excluir: '+firebaseErrorMessage(err));});
  };
  g('m-del').classList.add('open');
}

/* ── VISÃO GERAL ── */
function renderVisao(){
  setMC('<div id="vb"><div class="loading">⏳ Carregando...</div></div>');
  var lojas=Object.keys(LOJAS);
  Promise.all(lojas.map(function(l){return fbGet('caixa/'+l).then(function(d){return {l:l,d:d||{}};});}))
    .then(function(res){var a={};res.forEach(function(r){a[r.l]=r.d;});buildVisao(a);})
    .catch(function(err){
      setStatus('Firebase: erro','err');
      console.error('Erro ao carregar visão geral:',err);
      var vazio={coronel:{},correas:{},bingen:{}};
      buildVisao(vazio);
      var vb=g('vb');
      if(vb){
        vb.insertAdjacentHTML('afterbegin','<div class="card mb5" style="border-color:#FECACA;background:#FFF7F7"><div class="ch"><span class="ct" style="color:var(--danger)">⚠️ Firebase não respondeu</span></div><div style="padding:14px 18px;color:var(--mu);font-size:13px">A tela não vai mais ficar presa em carregando. O sistema abriu, mas o Firebase não conectou. Erro: '+String(firebaseErrorMessage(err)).replace(/</g,'&lt;').replace(/>/g,'&gt;')+'</div></div>');
      }
    });
}

function buildVisao(all){
  var lojas=Object.keys(LOJAS),tot={};
  lojas.forEach(function(l){
    tot[l]={pix:0,din:0,cred:0,par:0,deb:0,alim:0,moto:0,total:0};
    Object.values(all[l]||{}).filter(function(e){return e&&e.data&&e.data.startsWith(mesSel);}).forEach(function(e){
      tot[l].pix+=sf(e.pix);tot[l].din+=sf(e.din);
      tot[l].cred+=calcCred(e);tot[l].par+=sf(e.rpar);tot[l].deb+=sf(e.rdeb);
      tot[l].alim+=sf(e.alim);tot[l].moto+=sf(e.moto);tot[l].total+=calcTot(e);
    });
  });
  var grand={pix:0,din:0,cred:0,par:0,deb:0,alim:0,moto:0,total:0};
  lojas.forEach(function(l){Object.keys(grand).forEach(function(k){grand[k]+=tot[l][k];});});

  var cards=lojas.map(function(l){var c=LOJAS[l],t=tot[l];
    return '<div class="sc"><div class="sc-h" style="background:'+c.cor+'">'+c.icon+' '+c.nome+'</div><div class="sc-b">'
      +'<div class="sc-r"><span>PIX / Transferência</span><span>'+fmt(t.pix)+'</span></div>'
      +'<div class="sc-r"><span>Dinheiro</span><span>'+fmt(t.din)+'</span></div>'
      +'<div class="sc-r"><span>Crédito Líq.</span><span>'+fmt(t.cred)+'</span></div>'
      +'<div class="sc-r"><span>Parcelado</span><span>'+fmt(t.par)+'</span></div>'
      +'<div class="sc-r"><span>Débito</span><span>'+fmt(t.deb)+'</span></div>'
      +'<div class="sc-r"><span>Alim. e Refeição</span><span>'+fmt(t.alim)+'</span></div>'
      +'<div class="sc-r"><span>Motoboy</span><span style="color:var(--warn)">'+fmt(t.moto)+'</span></div>'
      +'<div class="sc-tot" style="border-color:'+c.cor+';color:'+c.cor+'"><span>Total do Mês</span><span>'+fmt(t.total)+'</span></div>'
      +'</div></div>';
  }).join('');

  g('vb').innerHTML=
    '<div style="display:flex;align-items:center;gap:16px;margin-bottom:20px;flex-wrap:wrap">'
    +'<h2 style="font-size:15px;font-weight:600;color:var(--mu)">Resumo por loja</h2>'
    +'<div id="picker-visao"></div>'
    +'</div>'
    +'<div class="sc-g mb5">'+cards+'</div>'
    +'<div class="card"><div class="ch"><span class="ct">📊 Consolidado — '+mesLabel()+'</span></div>'
    +'<div style="padding:16px;display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px">'
    +'<div class="st"><div class="st-l">Total Geral</div><div class="st-v">'+fmt(grand.total)+'</div></div>'
    +'<div class="st"><div class="st-l">PIX / Transf.</div><div class="st-v">'+fmt(grand.pix)+'</div></div>'
    +'<div class="st"><div class="st-l">Dinheiro</div><div class="st-v">'+fmt(grand.din)+'</div></div>'
    +'<div class="st"><div class="st-l">Crédito Líq.</div><div class="st-v">'+fmt(grand.cred)+'</div></div>'
    +'<div class="st"><div class="st-l">Parcelado</div><div class="st-v">'+fmt(grand.par)+'</div></div>'
    +'<div class="st"><div class="st-l">Débito</div><div class="st-v">'+fmt(grand.deb)+'</div></div>'
    +'<div class="st"><div class="st-l">Alim. e Refeição</div><div class="st-v">'+fmt(grand.alim)+'</div></div>'
    +'<div class="st"><div class="st-l">Motoboy Total</div><div class="st-v" style="color:var(--warn)">'+fmt(grand.moto)+'</div></div>'
    +'</div></div>';

  buildPicker('picker-visao','renderVisao');
}

/* ── ERROS GLOBAIS ── */
window.addEventListener('error',function(ev){
  try{
    setStatus('Erro no sistema','err');
    var mc=g('MC');
    if(mc&&mc.innerHTML.indexOf('Erro no sistema')<0){
      mc.insertAdjacentHTML('afterbegin','<div class="card mb5" style="border-color:#FECACA;background:#FFF7F7"><div class="ch"><span class="ct" style="color:var(--danger)">⚠️ Erro no sistema</span></div><div style="padding:14px 18px;color:var(--mu);font-size:13px">'+String(ev.message||'Erro desconhecido').replace(/</g,'&lt;').replace(/>/g,'&gt;')+'</div></div>');
    }
  }catch(e){}
});
window.addEventListener('unhandledrejection',function(ev){
  try{setStatus('Erro no sistema','err');console.error('Promessa rejeitada:',ev.reason);}catch(e){}
});

/* INIT */
goTo('visao');
</script>
</body>
</html>
