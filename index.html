.vg-card{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);padding:15px}
.vg-card.span2{grid-column:span 2}
.input-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--bd)}
.input-row label{flex:1;font-size:12px;color:var(--tx2)}
.input-row input{width:100px;background:var(--s2);border:1px solid var(--bd);border-radius:6px;padding:5px 8px;color:var(--tx);font-size:12px;font-family:'DM Mono',monospace;outline:none;text-align:right}
.input-row input:focus{border-color:var(--acc)}


/* AGENDA FINANCEIRA */
.ag-shell{display:flex;flex-direction:column;gap:12px}
.ag-top{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);padding:14px;display:flex;align-items:center;gap:12px;justify-content:space-between;flex-wrap:wrap}
.ag-title{display:flex;align-items:center;gap:10px;font-family:'Syne',sans-serif;font-weight:800;font-size:19px;text-transform:capitalize}
.ag-navbtn{width:34px;height:34px;border-radius:9px;background:var(--s2);border:1px solid rgba(249,115,22,.35);color:var(--acc);font-size:20px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s}
.ag-navbtn:hover{background:var(--acc3);border-color:var(--acc)}
.ag-actions{display:flex;gap:7px;align-items:center;flex-wrap:wrap}
.ag-cal{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);padding:12px;overflow:hidden}
.ag-week{display:grid;grid-template-columns:repeat(7,1fr);gap:7px;margin-bottom:7px}
.ag-dow{text-align:center;color:var(--tx2);font-size:11px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;padding:4px}
.ag-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:7px}
.ag-day{min-height:118px;background:linear-gradient(180deg,rgba(255,255,255,.025),rgba(255,255,255,.012));border:1px solid var(--bd);border-radius:12px;padding:9px;position:relative;cursor:pointer;transition:all .14s;display:flex;flex-direction:column;gap:6px;overflow:hidden}
.ag-day:hover{border-color:rgba(249,115,22,.55);transform:translateY(-1px);box-shadow:0 8px 20px rgba(0,0,0,.22)}
.ag-day.empty{background:transparent;border-color:transparent;cursor:default;box-shadow:none;transform:none}
.ag-day.today{border-color:var(--acc);box-shadow:0 0 0 1px rgba(249,115,22,.35) inset}
.ag-day.has{background:rgba(249,115,22,.055)}
.ag-day.mix{background:linear-gradient(135deg,rgba(34,197,94,.08),rgba(239,68,68,.08))}
.ag-day.rec{background:rgba(34,197,94,.07)}
.ag-day.pag{background:rgba(239,68,68,.07)}
.ag-day.done{opacity:.74;background:rgba(34,197,94,.045)}
.ag-num{font-family:'DM Mono',monospace;font-size:13px;font-weight:800;color:var(--tx2);display:flex;align-items:center;justify-content:space-between;gap:5px}
.ag-check{width:20px;height:20px;border-radius:50%;background:var(--ok);color:#06130b;font-size:12px;display:flex;align-items:center;justify-content:center;font-weight:900;flex-shrink:0}
.ag-total{font-family:'Syne',sans-serif;font-size:14px;font-weight:800;letter-spacing:-.02em;line-height:1.12;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
.ag-total.pos{color:var(--ok)}.ag-total.neg{color:var(--er)}.ag-total.zero{color:var(--tx3)}
.ag-lines{display:flex;flex-direction:column;gap:3px;margin-top:auto}
.ag-line{display:flex;align-items:center;justify-content:space-between;gap:5px;font-size:10.5px;color:var(--tx2);background:rgba(255,255,255,.035);border:1px solid rgba(255,255,255,.04);border-radius:6px;padding:3px 5px}
.ag-line strong{font-family:'DM Mono',monospace;font-size:10.5px;color:var(--tx)}
.ag-pill{display:inline-flex;align-items:center;gap:4px;border-radius:999px;padding:2px 7px;font-size:10px;font-weight:800}
.ag-pill.rec{background:var(--ok2);color:var(--ok)}.ag-pill.pag{background:var(--er2);color:var(--er)}.ag-pill.open{background:var(--wa2);color:var(--wa)}.ag-pill.done{background:var(--ok2);color:var(--ok)}
.ag-list{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden}
.ag-list-head{padding:12px 14px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;gap:10px}
.ag-item{display:grid;grid-template-columns:92px 1fr 115px 84px 98px;gap:10px;align-items:center;padding:10px 14px;border-bottom:1px solid var(--bd)}
.ag-item:last-child{border-bottom:none}
.ag-item:hover{background:rgba(255,255,255,.022)}
.ag-item-title{font-weight:700;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ag-item-sub{font-size:11px;color:var(--tx2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ag-muted{color:var(--tx3);font-size:11px}
.ag-day-detail{display:flex;flex-direction:column;gap:8px}
.ag-detail-row{display:grid;grid-template-columns:1fr 105px 86px 92px;gap:8px;align-items:center;background:var(--s2);border:1px solid var(--bd);border-radius:9px;padding:9px}
@media(max-width:980px){.ag-week,.ag-grid{gap:5px}.ag-day{min-height:100px;padding:7px}.ag-total{font-size:13px}.ag-item{grid-template-columns:82px 1fr 100px;}.ag-item .hide-sm{display:none}}
@media(max-width:768px){.ag-week,.ag-grid{grid-template-columns:repeat(2,1fr)}.ag-dow{display:none}.ag-day.empty{display:none}.ag-top{align-items:stretch}.ag-actions{width:100%}.ag-actions .btn{flex:1;justify-content:center}.ag-detail-row{grid-template-columns:1fr}.ag-item{grid-template-columns:1fr}.ag-item .hide-sm{display:block}}
/* Ajuste visual forte da Agenda Financeira: números menores e leitura limpa */
.ag-shell .kpi{padding:11px 12px!important;min-width:0}
.ag-shell .kpi-v{font-size:15px!important;line-height:1.08!important;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:-.03em}
.ag-shell .kpi-s{font-size:10.5px!important;line-height:1.2}
.ag-day{min-height:104px!important;padding:7px 8px!important;gap:4px!important}
.ag-num{font-size:12px!important;line-height:1!important}
.ag-check{width:18px!important;height:18px!important;font-size:11px!important}
.ag-day .ag-total,
.ag-day .ag-total.pos,
.ag-day .ag-total.neg,
.ag-day .ag-total.zero{
  font-family:'DM Mono',monospace!important;
  font-size:11.2px!important;
  font-weight:900!important;
  letter-spacing:-.075em!important;
  line-height:1.05!important;
  margin:0!important;
  white-space:nowrap!important;
  overflow:hidden!important;
  text-overflow:ellipsis!important;
  max-width:100%!important;
}
.ag-lines{gap:3px!important}
.ag-line{font-size:9.2px!important;line-height:1.05!important;padding:2px 5px!important;border-radius:6px!important;gap:4px!important}
.ag-line strong{font-family:'DM Mono',monospace!important;font-size:9.4px!important;line-height:1.05!important;letter-spacing:-.045em!important;color:var(--tx)!important}
.ag-muted{font-size:10.5px!important;line-height:1.1!important}
@media(min-width:1400px){
  .ag-day .ag-total,.ag-day .ag-total.pos,.ag-day .ag-total.neg,.ag-day .ag-total.zero{font-size:12px!important}
  .ag-line{font-size:9.8px!important}
  .ag-line strong{font-size:10px!important}
}
@media(max-width:980px){
  .ag-day{min-height:96px!important;padding:6px!important}
  .ag-day .ag-total,.ag-day .ag-total.pos,.ag-day .ag-total.neg,.ag-day .ag-total.zero{font-size:10.3px!important}
  .ag-line{font-size:8.8px!important;padding:2px 4px!important}
  .ag-line strong{font-size:8.9px!important}
}


/* Ajuste definitivo: mês da agenda menor e Plano de Contas em quadros */
.ag-shell .ag-title{font-size:15px!important;line-height:1.05!important;gap:8px!important;letter-spacing:-.035em!important}
.ag-shell .ag-title span{font-size:15px!important;line-height:1.05!important;font-weight:800!important;white-space:nowrap!important}
.ag-shell .ag-navbtn{width:28px!important;height:28px!important;border-radius:8px!important;font-size:18px!important;line-height:1!important}
.ag-shell .ag-top{padding:11px!important;gap:9px!important}
@media(min-width:1200px){.ag-shell .ag-title,.ag-shell .ag-title span{font-size:16px!important}}
@media(max-width:768px){.ag-shell .ag-title,.ag-shell .ag-title span{font-size:14px!important}.ag-shell .ag-navbtn{width:26px!important;height:26px!important;font-size:16px!important}}
.cc-layout{display:grid;grid-template-columns:minmax(250px,330px) 1fr;gap:12px;align-items:start}
.cc-panel{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden}
.cc-panel-head{padding:12px 14px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;gap:8px}
.cc-panel-title{font-family:'Syne',sans-serif;font-size:13px;font-weight:800;color:var(--tx);letter-spacing:-.02em}
.cc-panel-sub{font-size:10.5px;color:var(--tx2);margin-top:2px}
.cc-groups{display:flex;flex-direction:column;gap:7px;padding:10px;max-height:calc(100vh - 260px);overflow:auto}
.cc-group-card{border:1px solid var(--bd);background:linear-gradient(180deg,rgba(255,255,255,.026),rgba(255,255,255,.012));border-radius:12px;padding:10px;cursor:pointer;transition:all .12s;display:flex;align-items:center;justify-content:space-between;gap:8px}
.cc-group-card:hover{border-color:rgba(249,115,22,.55);transform:translateY(-1px)}
.cc-group-card.act{border-color:var(--acc);box-shadow:0 0 0 1px rgba(249,115,22,.25) inset;background:rgba(249,115,22,.08)}
.cc-group-name{font-size:12.5px;font-weight:800;color:var(--tx);line-height:1.15}
.cc-group-meta{font-size:10px;color:var(--tx2);margin-top:3px}
.cc-count{font-family:'DM Mono',monospace;font-size:11px;font-weight:800;color:var(--acc);background:var(--acc3);border:1px solid rgba(249,115,22,.18);border-radius:999px;padding:3px 7px;white-space:nowrap}
.cc-sub-list{padding:10px;display:flex;flex-direction:column;gap:7px}
.cc-sub-row{display:grid;grid-template-columns:1fr 90px 74px;gap:8px;align-items:center;background:rgba(255,255,255,.022);border:1px solid var(--bd);border-radius:12px;padding:10px}
.cc-sub-name{font-size:13px;font-weight:750;color:var(--tx)}
.cc-sub-empty{padding:36px 18px;text-align:center;color:var(--tx3)}
.cc-mini-actions{display:flex;gap:5px;justify-content:flex-end}
.cc-note{font-size:10.5px;color:var(--tx2);padding:10px 12px;border-top:1px solid var(--bd);line-height:1.35}
@media(max-width:980px){.cc-layout{grid-template-columns:1fr}.cc-groups{max-height:none}.cc-sub-row{grid-template-columns:1fr}.cc-mini-actions{justify-content:flex-start}}

/* PAGINATION */
.pag{display:flex;align-items:center;gap:4px;justify-content:flex-end;margin-top:9px}
.pb{width:27px;height:27px;border-radius:6px;display:flex;align-items:center;justify-content:center;background:var(--s1);border:1px solid var(--bd);color:var(--tx2);font-size:12px;cursor:pointer;transition:all .12s}
.pb:hover,.pb.act{border-color:var(--acc);color:var(--acc)}
.pi{font-size:11px;color:var(--tx2);margin:0 4px}

.es{text-align:center;padding:45px 20px;color:var(--tx3)}
.es .em{font-size:30px;margin-bottom:8px}
.es h3{color:var(--tx2);font-size:13px;margin-bottom:4px}
.ra{display:flex;gap:3px;justify-content:flex-end}

@media(max-width:768px){.kpis{grid-template-columns:1fr 1fr}.fg{grid-template-columns:1fr}.bi-grid{grid-template-columns:1fr}.vg-grid{grid-template-columns:1fr}}

/* Ajuste Agenda: recebimentos manuais simples por origem */
.ag-origin-grid{display:grid;grid-template-columns:repeat(4,minmax(90px,1fr));gap:8px;margin-top:6px}
.ag-origin-grid input{display:none!important}
.ag-origin-card{display:flex;align-items:center;justify-content:center;min-height:42px;border:1px solid var(--bd);border-radius:12px;background:var(--s2);color:var(--tx2);font-size:13px;font-weight:750;cursor:pointer;transition:.15s ease;user-select:none}
.ag-origin-card:hover{border-color:rgba(255,107,26,.45);color:var(--tx)}
.ag-origin-grid input:checked+.ag-origin-card{border-color:var(--acc);background:rgba(255,107,26,.14);color:var(--acc);box-shadow:0 0 0 1px rgba(255,107,26,.22) inset}
@media(max-width:760px){.ag-origin-grid{grid-template-columns:repeat(2,1fr)}}

/* Robustez financeira v1 — leitura suave, auditoria e fluxo de caixa */
:root{--font-soft:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif!important}
body,.app,.content,.btn,.fc,.fv,input,select,textarea,table{font-family:var(--font-soft)!important;letter-spacing:-.01em}
.ag-shell .ag-title span{font-size:18px!important;font-weight:750!important;letter-spacing:-.025em!important}
.ag-shell .ag-navbtn{width:30px!important;height:30px!important;font-size:17px!important}
.kpi .kpi-v,.ag-total,.cc-stat-v{font-family:var(--font-soft)!important;font-weight:700!important;letter-spacing:-.025em!important}
.fx-top{display:grid;grid-template-columns:minmax(260px,.9fr) minmax(340px,1.1fr);gap:12px;margin-bottom:12px}
.fx-card,.audit-card{background:linear-gradient(180deg,rgba(255,255,255,.035),rgba(255,255,255,.015));border:1px solid var(--bd);border-radius:16px;padding:14px;box-shadow:0 12px 30px rgba(0,0,0,.12)}
.fx-title,.audit-title{font-size:15px;font-weight:750;color:var(--tx);margin-bottom:4px;letter-spacing:-.02em}
.fx-sub,.audit-sub{font-size:11.5px;color:var(--tx2);line-height:1.35}
.fx-controls{display:flex;gap:8px;align-items:end;flex-wrap:wrap;margin-top:12px}
.fx-controls .fgi{min-width:145px;flex:1}
.fx-month{font-size:18px;font-weight:750;color:var(--tx);letter-spacing:-.025em}
.fx-warn{border-color:rgba(239,68,68,.28)!important;background:rgba(239,68,68,.07)!important}
.fx-ok{border-color:rgba(34,197,94,.24)!important;background:rgba(34,197,94,.06)!important}
.fx-row-bad td{background:rgba(239,68,68,.055)}
.fx-row-good td{background:rgba(34,197,94,.035)}
.audit-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(235px,1fr));gap:10px;margin-bottom:12px}
.audit-chip{display:inline-flex;align-items:center;gap:5px;border:1px solid var(--bd);background:var(--s2);border-radius:999px;padding:5px 8px;font-size:11px;color:var(--tx2);font-weight:650;margin:2px 4px 2px 0}
.audit-chip.bad{border-color:rgba(239,68,68,.35);color:#ff6b6b;background:rgba(239,68,68,.08)}
.audit-chip.warn{border-color:rgba(245,158,11,.35);color:#fbbf24;background:rgba(245,158,11,.08)}
.audit-chip.ok{border-color:rgba(34,197,94,.32);color:#4ade80;background:rgba(34,197,94,.08)}
.audit-list{display:grid;gap:10px}
.audit-item{border:1px solid var(--bd);background:var(--s1);border-radius:14px;padding:12px;transition:.16s ease}
.audit-item.audit-click{cursor:pointer}
.audit-item.audit-click:hover{border-color:rgba(255,107,26,.55);background:rgba(255,255,255,.04);transform:translateY(-1px)}
.audit-item h4{margin:0 0 4px;font-size:13.5px;color:var(--tx);font-weight:750}

function loadScriptSafe(src, timeoutMs=8000){
  return new Promise((resolve,reject)=>{
    if(document.querySelector(`script[data-safe-src="${src}"]`)) return resolve(true);
    const sc=document.createElement('script');
    let done=false;
    const finish=(ok,err)=>{ if(done) return; done=true; clearTimeout(t); ok?resolve(true):reject(err||new Error('Falha ao carregar '+src)); };
    const t=setTimeout(()=>finish(false,new Error('Tempo esgotado ao carregar '+src)),timeoutMs);
    sc.src=src;
    sc.async=true;
    sc.defer=true;
    sc.dataset.safeSrc=src;
    sc.onload=()=>finish(true);
    sc.onerror=()=>finish(false,new Error('Erro ao carregar '+src));
    document.head.appendChild(sc);
  });
}

// ── Sync em tempo real (multi-usuário) ────────────────
function setupRealtimeSync(){
  unsubListeners.forEach(u=>u());
  unsubListeners = [];
  // lancamentos em tempo real, sem reler a coleção inteira no listener.
  // O carregamento completo acontece uma vez no loadAll(); depois escutamos só alterações novas.
  let sinceTs = null;
  try{ sinceTs = firebase.firestore.Timestamp.fromDate(new Date(Date.now()-120000)); }catch(_e){}
  const lancRef = sinceTs ? db.collection('lancamentos').where('updated_at','>',sinceTs) : db.collection('lancamentos').limit(1);
  const unsub = lancRef.onSnapshot(snap=>{
      let mudou=false;
      snap.docChanges().forEach(ch=>{
        const d={id:ch.doc.id,...ch.doc.data()};
        if(ch.type==='added'||ch.type==='modified'){
          const i=store.lancamentos.findIndex(x=>x.id===d.id);
          if(i>=0) store.lancamentos[i]=d; else store.lancamentos.unshift(d);
          mudou=true;
        } else if(ch.type==='removed'){
          store.lancamentos=store.lancamentos.filter(x=>x.id!==ch.doc.id);
          mudou=true;
        }
      });
      if(!mudou) return;
      lsSave();
      setStatus('● '+store.lancamentos.length+' lanç. | online','var(--ok)');
      if(CM) safeRender(CM);
    }, err=>{ console.warn('Sync econômico de lançamentos offline:',err.message); setStatus('● online sem tempo real','var(--wa)'); });
  unsubListeners.push(unsub);

  // agenda financeira manual em tempo real + deduplicação por data/origem.
  const unsubAgenda = db.collection('agenda_financeira')
    .onSnapshot(snap=>{
      let mudou=false;
      snap.docChanges().forEach(ch=>{
        const d={id:ch.doc.id,...ch.doc.data()};
        if(ch.type==='added'||ch.type==='modified'){
          const i=store.agenda.findIndex(x=>x.id===d.id);
          if(i>=0) store.agenda[i]=d; else store.agenda.push(d);
          mudou=true;
        } else if(ch.type==='removed'){
          const antes=store.agenda.length;
          store.agenda=store.agenda.filter(x=>x.id!==ch.doc.id);
          if(store.agenda.length!==antes) mudou=true;
        }
      });
      if(!mudou) return;
      try{ normalizeAgendaStore(); agScheduleFirebaseCleanup(); }catch(_e){}
      lsSave();
      if(['agenda','fluxocaixa','visaogeral','dashboard','auditoria'].includes(CM)) safeRender(CM);
    }, err=>{ console.warn('Agenda offline:', err.message); });
  unsubListeners.push(unsubAgenda);

  // plano de contas em tempo real
  const unsubCC = db.collection('centrocusto').onSnapshot(snap=>{
    snap.docChanges().forEach(ch=>{
      const d={id:ch.doc.id,...ch.doc.data()};
      if(ch.type==='added'||ch.type==='modified'){
        const i=store.centrocusto.findIndex(x=>x.id===d.id);
        if(i>=0) store.centrocusto[i]=d; else store.centrocusto.push(d);
      } else if(ch.type==='removed'){
        store.centrocusto=store.centrocusto.filter(x=>x.id!==ch.doc.id);
      }
    });
    ccEnsureIds();
    lsSave();
    if(['centrocusto','lancamentos','dashboard','visaogeral','dre','auditoria'].includes(CM)) safeRender(CM);
  }, err=>console.warn('Plano de contas offline:',err.message));
  unsubListeners.push(unsubCC);

  // clientes atendidos em tempo real
  const unsubClientes = db.collection('clientes_mes').onSnapshot(snap=>{
    const novo={}; snap.docs.forEach(d=>{novo[d.id]=d.data().count||0;});
    store.clientes_mes=novo; lsSave();
    if(['visaogeral','dashboard'].includes(CM) && !clienteInputAtivo()) safeRender(CM);
  }, err=>console.warn('Clientes offline:',err.message));
  unsubListeners.push(unsubClientes);

  // patrimônio e configurações em tempo real
  const unsubPat = db.collection('patrimonio').onSnapshot(snap=>{
    store.patrimonio=snap.docs.map(d=>({id:d.id,...d.data()})); lsSave();
    if(['patrimonio','auditoria'].includes(CM)) safeRender(CM);
  }, err=>console.warn('Patrimônio offline:',err.message));
  unsubListeners.push(unsubPat);

  const unsubCfg = db.collection('config').onSnapshot(snap=>{
    if(snap.docs.length){ store.cfg={...store.cfg,...snap.docs[0].data()}; lsSave(); if(['config','fluxocaixa'].includes(CM)) render(CM); }
  }, err=>console.warn('Config offline:',err.message));
  unsubListeners.push(unsubCfg);
}

// ── CRUD Firestore ─────────────────────────────────────
async function fbAdd(col, data){
  if(!fbOk) return null;
  delete data.id;
  data.updated_at = firebase.firestore.FieldValue.serverTimestamp();
  const ref = await db.collection(col).add(data);
  return ref.id;
}
async function fbSet(col, id, data){
  if(!fbOk) return;
  delete data.id;
  data.updated_at = firebase.firestore.FieldValue.serverTimestamp();
  await db.collection(col).doc(id).set(data, {merge:true});
}
async function fbDel(col, id){
  if(!fbOk) return;
  await db.collection(col).doc(id).delete();
}
async function fbBatch(col, items){
  if(!fbOk) return;
  const CHUNK=499;
  for(let i=0;i<items.length;i+=CHUNK){
    const batch=db.batch();
    items.slice(i,i+CHUNK).forEach(item=>{
      const d={...item};delete d.id;
      d.updated_at=firebase.firestore.FieldValue.serverTimestamp();
      const ref=db.collection(col).doc();
      batch.set(ref,d);
    });
    await batch.commit();
    console.log(`Batch ${i/CHUNK+1} ok`);
  }
}

async function saveClientesMes(mes, count){
  // Salva somente quando a digitação estabiliza ou quando o campo perde o foco.
  // Se o campo estiver vazio, remove o mês para permitir apagar o número corretamente.
  if(count === null || count === undefined || count === ''){
    delete store.clientes_mes[mes];
    lsSave();
    if(fbOk) await db.collection('clientes_mes').doc(mes).delete();
    return;
  }
  store.clientes_mes[mes] = Number(count) || 0;
  lsSave();
  if(!fbOk) return;
  await db.collection('clientes_mes').doc(mes).set({count:store.clientes_mes[mes]}, {merge:true});
}

const clientesMesTimers = {};
window.clientesMesDigitado = function(el, mes){
  const raw = String(el.value || '').replace(/\D/g,'');
  if(el.value !== raw) el.value = raw;

  // Atualiza só a memória da tela, sem redesenhar e sem gravar pesado a cada tecla.
  if(raw === '') delete store.clientes_mes[mes];
  else store.clientes_mes[mes] = parseInt(raw, 10) || 0;

  clearTimeout(clientesMesTimers[mes]);
  clientesMesTimers[mes] = setTimeout(()=>{
    saveClientesMes(mes, raw === '' ? null : parseInt(raw, 10)).catch(()=>{});
  }, 1000);
};
window.clientesMesFechar = function(mes, el){
  const raw = String((el && el.value) || '').replace(/\D/g,'');
  if(el && el.value !== raw) el.value = raw;
  clearTimeout(clientesMesTimers[mes]);
  saveClientesMes(mes, raw === '' ? null : parseInt(raw, 10)).catch(()=>{});
  rVG();
};

  const filtroManual=!!(sw||fS||fT||fMc||fMv||fC||fSub||fFP);

window.previewDatas=()=>{
  const MN=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  const tp=$('f-rec')?$('f-rec').value:'unica';
  const dv=($('f-dv')||{value:''}).value;
  const dc=($('f-dc')||{value:''}).value;
  const vl=parseFloat(($('f-vl')||{value:0}).value)||0;

  if(tp==='parcelada'){
    const np=parseInt(($('f-np')||{value:2}).value)||2;
    const valParc=vl/np;
    const pc=$('parc-valor-calc');
    if(pc) pc.textContent=vl?('R$ '+valParc.toFixed(2).replace('.',',')):'—';
    const prev=$('preview-parc');
    if(!prev) return;
    if(!dv){ prev.innerHTML='<span style="color:var(--wa)">⚠️ Informe a data de vencimento para ver as datas</span>'; return; }
    const datas=[];
    for(let i=0;i<Math.min(np,6);i++){
      const d=new Date(dv+'T12:00:00');d.setMonth(d.getMonth()+i);
      datas.push(d.getDate().toString().padStart(2,'0')+'/'+MN[d.getMonth()]+'/'+d.getFullYear());
    }
    const extra=np>6?' + '+(np-6)+' mais…':'';
    prev.innerHTML='<strong>Parcelas geradas:</strong> '+datas.join(' · ')+extra;
  }

  if(tp==='recorrente'){
    const nm=parseInt(($('f-nm')||{value:12}).value)||12;
    const prev=$('preview-recorr');
    if(!prev) return;
    const base=dv||dc;
    if(!base){ prev.innerHTML='<span style="color:var(--wa)">⚠️ Informe a data de vencimento para ver as datas</span>'; return; }
    const datas=[];
    for(let i=0;i<Math.min(nm,6);i++){
      const d=new Date(base+'T12:00:00');d.setMonth(d.getMonth()+i);
      datas.push(d.getDate().toString().padStart(2,'0')+'/'+MN[d.getMonth()]+'/'+d.getFullYear());
    }
    const extra=nm>6?' + '+(nm-6)+' mais…':'';
    prev.innerHTML='<strong>'+nm+' lançamentos:</strong> '+datas.join(' · ')+extra;
  }
};

window.svL=async function(id){
  const d=getLancD();
  if(!d.data_competencia||!d.valor||!d.categoria){toast('Preencha campos obrigatórios','er');return;}
  if(id){
    const i=store.lancamentos.findIndex(x=>x.id===id);
    if(i>=0) store.lancamentos[i]={...store.lancamentos[i],...d};
    cM(); render(CM); toast('Atualizado! ✅','ok');
    try{ if(i>=0) await fbSet('lancamentos',id,d); lsSave(); }catch(e){ lsSave(); }
  } else {
    const rec=$('f-rec')?$('f-rec').value:'unica';
    if(rec==='parcelada'){
      const np=parseInt(($('f-np')||{value:2}).value)||2;
      const gid=uid();
      for(let i=0;i<np;i++){
        const dc=addMonths(d.data_competencia,i);
        const dv=d.data_vencimento?addMonths(d.data_vencimento,i):null;
        store.lancamentos.unshift({id:uid(),...d,data_competencia:dc,data_vencimento:dv,descricao:`${d.descricao||d.categoria} (${i+1}/${np})`,parcela_info:`${i+1}/${np}`,parcelamento_id:gid});
      }
      for(const l of store.lancamentos.slice(0,np)){await fbAdd('lancamentos',{...l});}
      lsSave();
      toast(`${np} parcelas criadas!`,'ok');
    } else if(rec==='recorrente'){
      const nm=parseInt(($('f-nm')||{value:12}).value)||12;
      const gid=uid();
      for(let i=0;i<nm;i++){
        const dc=addMonths(d.data_competencia,i);
        const dv=d.data_vencimento?addMonths(d.data_vencimento,i):null;
        store.lancamentos.unshift({id:uid(),...d,data_competencia:dc,data_vencimento:dv,recorrente:true,recorrencia_id:gid});
      }
      for(const l of store.lancamentos.slice(0,nm)){await fbAdd('lancamentos',{...l});}
      lsSave();
      toast(`${nm} meses recorrentes criados!`,'ok');
    } else {
      const tmpId = uid();
      store.lancamentos.unshift({id:tmpId,...d});
      cM(); render(CM); toast('Criado! ✅','ok');
      try{
        const newId = await fbAdd('lancamentos',{...d});
        if(newId){ const idx=store.lancamentos.findIndex(x=>x.id===tmpId); if(idx>=0) store.lancamentos[idx].id=newId; }
        lsSave();
      }catch(e){ lsSave(); }
    }
  }
  cM();
  if(CM==='auditoria') rAuditoria();
  else if(CM==='agenda') rAgenda();
  else if(CM==='fluxocaixa') rFluxo();
  else rLanc();
};
window.dL=async function(id){
  const r=store.lancamentos.find(x=>x.id===id);
  const hasGrp=r&&(r.parcelamento_id||r.recorrencia_id);
  const gid=r?.parcelamento_id||r?.recorrencia_id;
  const extras=hasGrp?store.lancamentos.filter(x=>(x.parcelamento_id||x.recorrencia_id)===gid).length:0;
  confirm_('Excluir Lançamento',
    extras>1?`Excluir só este ou todos os ${extras} vinculados?`:`Excluir "${r?.descricao||'este lançamento'}"?`,
    async ()=>{
      if(hasGrp&&extras>1&&confirm(`Excluir TODOS os ${extras} lançamentos vinculados?`)){
        const idsGrp=store.lancamentos.filter(x=>(x.parcelamento_id||x.recorrencia_id)===gid).map(x=>x.id);
        store.lancamentos=store.lancamentos.filter(x=>(x.parcelamento_id||x.recorrencia_id)!==gid);
        for(const xid of idsGrp) await fbDel('lancamentos',xid);
        lsSave();
        toast(`${extras} lançamentos excluídos`,'ok');
      } else {
        store.lancamentos=store.lancamentos.filter(x=>x.id!==id);
        render(CM); toast('Excluído ✅','ok');
        try{ await fbDel('lancamentos',id); lsSave(); }catch(e){ lsSave(); }
      }
      if(CM==='auditoria') rAuditoria();
      else if(CM==='agenda') rAgenda();
      else if(CM==='fluxocaixa') rFluxo();
      else rLanc();
    });
};

const DRE_CLASS=[
  {id:'rec_bruta',lbl:'Receita Bruta'},
  {id:'ded',lbl:'Deduções da Receita'},
  {id:'custos',lbl:'Custo dos Produtos'},
  {id:'desp_op',lbl:'Despesas Operacionais'},
  {id:'desp_pes',lbl:'Despesas com Pessoal'},
  {id:'outras',lbl:'Outras Despesas'},
  {id:'depreciacao',lbl:'Depreciação'},
  {id:'fora',lbl:'Fora do DRE'}
];
function dreClassLabel(id){return (DRE_CLASS.find(x=>x.id===id)||{}).lbl||'Sem classificação';}
function dreInferClass(cat){
  const n=ccNorm(cat);
  if(['receita com produtos e mercadorias','outras receitas operacionais','vendas','a receber'].includes(n)) return 'rec_bruta';
  if(['impostos sobre a receita','outras deducoes','taxas de cartao','taxas ifood','taxas i food','taxas'].includes(n)) return 'ded';
  if(n==='custo dos produtos') return 'custos';
  if(n==='despesas com pessoal') return 'desp_pes';
  if(n==='outras despesas operacionais') return 'outras';
  if(n==='depreciacao') return 'depreciacao';
  if(['transferencia entre contas','transferências entre contas','aporte dos socios','aporte dos sócios','distribuicao de lucros','distribuição de lucros','aquisicao de bens','aquisição de bens'].includes(n)) return 'fora';
  if(n==='despesas operacionais') return 'desp_op';
  return 'desp_op';
}
function dreClassForPlanRow(r){return r?.dre_id||r?.dre_classificacao||dreInferClass(r?.categoria||'');}
function dreClassForGroup(g){
  const rows=ccRows(g?.id||g?.nome||g)||[];
  const explicit=rows.find(r=>r.dre_id||r.dre_classificacao);
  return explicit?(explicit.dre_id||explicit.dre_classificacao):dreInferClass(g?.nome||g||'');
}
function dreClassForLanc(r){
  if(r?.dre_id||r?.dre_classificacao) return r.dre_id||r.dre_classificacao;
  const g=ccGroupByAny(r?.categoria_id||r?.categoria);
  if(g) return dreClassForGroup(g);
  return dreInferClass(r?.categoria||'');
}
function dreLancMatchesPlan(l,row){
  const gid=ccRowGroupId(row), sid=ccRowSubId(row);
  const gm=gid?((l.categoria_id&&l.categoria_id===gid)||ccNorm(l.categoria)===ccNorm(row.categoria)):ccNorm(l.categoria)===ccNorm(row.categoria);
  if(!gm) return false;
  if(row.subcategoria&&sid) return (l.subcategoria_id&&l.subcategoria_id===sid)||ccNorm(l.subcategoria)===ccNorm(row.subcategoria);
  if(row.subcategoria) return ccNorm(l.subcategoria)===ccNorm(row.subcategoria);
  return true;
}

function dreDateKey(r){
  const d=(r&&(
    r.data_competencia||r.competencia||r.data_vencimento||r.vencimento||r.data_pagamento||r.data||''
  ))||'';
  return String(d).slice(0,7);
}
function dreIsReceitaLanc(r){
  const rd=ccNorm(r?.rec_desp||r?.tipo||r?.natureza||'');
  const cat=ccNorm(r?.categoria||r?.grupo||'');
  const sub=ccNorm(r?.subcategoria||'');
  if(rd.includes('receber')||rd.includes('receita')||rd.includes('entrada')||rd==='vendas') return true;
  if(['vendas','a receber','receita com produtos e mercadorias','outras receitas operacionais'].includes(cat)) return true;
  if(['vendas','ifood','i food','cartao credito','cartão crédito','cartao debito','cartão débito','pix','dinheiro'].includes(sub)) return true;
  return false;
}
function dreClassForLancFast(r){
  if(dreIsReceitaLanc(r)) return 'rec_bruta';
  return dreClassForLanc(r);
}
function dreSignForClass(id){return id==='rec_bruta'?1:-1;}
function dreEmptyVals(){
  const vals={};
  DRE_STRUCT.forEach(row=>{ vals[row.id]=0; });
  return vals;
}
function dreFinalize(vals){
  DRE_STRUCT.forEach(row=>{
    if(row.tipo==='tot') vals[row.id]=row.deps.reduce((s,d)=>s+(vals[d]||0),0);
  });
  return vals;
}
function calcDRE(lancs){
  const vals=dreEmptyVals();
  (lancs||[]).forEach(r=>{
    const cls=dreClassForLancFast(r);
    if(!vals.hasOwnProperty(cls) || cls==='fora') return;
    const v=Math.abs(Number(r.valor)||0);
    vals[cls]+=v*dreSignForClass(cls);
  });
  return dreFinalize(vals);
}
function rDRE(){
  const mn=$('month-nav'); if(mn){ mn.classList.remove('show'); mn.innerHTML=''; }
  const content=$('content');
  if(!content) return;
  const currentYear=new Date().getFullYear().toString();
  const rawLanc=(store.lancamentos||[]);
  let anos=[...new Set(rawLanc.map(r=>dreDateKey(r).slice(0,4)).filter(Boolean))].sort().reverse();
  if(!anos.includes(currentYear)) anos.unshift(currentYear);
  anos=[...new Set(anos.map(String))];
  if(!dreAnoSel) dreAnoSel=currentYear;
  const fAno=String(dreAnoSel||currentYear);

  const lancAno=[];
  const mesesSet=new Set();
  rawLanc.forEach(r=>{
    const ym=dreDateKey(r);
    if(!ym || !ym.startsWith(fAno+'-')) return;
    lancAno.push(r);
    mesesSet.add(ym.slice(5,7));
  });
  const mesesDisp=[...mesesSet].sort();

  if(!mesesDisp.length){
    const yearBtns=anos.map(ano=>`<button class="m-tab${String(fAno)===String(ano)?' act':''}" onclick="setDreAno('${ccSafe(String(ano))}')">${ccSafe(String(ano))}</button>`).join('');
    content.innerHTML=`<div class="dre-page" data-versao="DRE-API-DESIGN-2026-06-06"><div class="dre-yearbar">${yearBtns}</div><div class="es"><div class="em">📈</div><h3>Sem dados para ${ccSafe(fAno)}</h3></div></div>`;
    return;
  }

  const dreM={};
  mesesDisp.forEach(m=>{ dreM[m]=dreEmptyVals(); });
  const dreTotal=dreEmptyVals();
  const planTotals={};

  function planKeyFromLanc(l){return `${ccNorm(l?.categoria_id||l?.categoria||'')}|${ccNorm(l?.subcategoria_id||l?.subcategoria||'')}`;}
  function planKeyFromRow(r){return `${ccNorm(r?.grupo_id||r?.categoria_id||r?.categoria||'')}|${ccNorm(r?.subcategoria_id||r?.sub_id||r?.subcategoria||'')}`;}

  const planRows=(store.centrocusto||[])
    .filter(c=>c&&c.subcategoria&&dreClassForPlanRow(c)!=='fora')
    .map(c=>({...c,_dre:dreClassForPlanRow(c),_key:planKeyFromRow(c)}));
  const planKeySet=new Set(planRows.map(r=>r._key));

  lancAno.forEach(r=>{
    const ym=dreDateKey(r); const m=ym.slice(5,7);
    const cls=dreClassForLancFast(r);
    if(!dreTotal.hasOwnProperty(cls) || cls==='fora') return;
    const val=(Math.abs(Number(r.valor)||0))*dreSignForClass(cls);
    dreTotal[cls]+=val;
    if(dreM[m]) dreM[m][cls]+=val;

    const pk=planKeyFromLanc(r);
    if(planKeySet.has(pk)){
      if(!planTotals[pk]) planTotals[pk]={total:0,mes:{}};
      planTotals[pk].total+=val;
      planTotals[pk].mes[m]=(planTotals[pk].mes[m]||0)+val;
    }
  });
  dreFinalize(dreTotal); mesesDisp.forEach(m=>dreFinalize(dreM[m]));

  const thM=mesesDisp.map(m=>`<th class="dv">${MES_NM[+m-1]}</th>`).join('');
  const colCnt=mesesDisp.length+3;

  function bkRow(vals){
    const rb=vals['rec_bruta']||0;
    const cv=Math.abs(vals['custos']||0);
    const cf=Math.abs((vals['desp_op']||0)+(vals['desp_pes']||0)+(vals['outras']||0));
    const mc=rb-cv; const mcPct=rb?mc/rb:0;
    const bep=mcPct>0?cf/mcPct:null;
    const marg=rb?((vals['resultado']||0)/rb*100):0;
    return{bep,marg,mc,mcPct:mcPct*100};
  }
  const bkTotal=bkRow(dreTotal);
  const bkM={}; mesesDisp.forEach(m=>{ bkM[m]=bkRow(dreM[m]); });
  const recBruta=Math.abs(dreTotal['rec_bruta']||1);
  function valCls(v){return v>0?'dp':v<0?'dn':'dc';}
  function dreCleanSubLabel(v){
    let t=String(v||'Sem subcategoria').trim();
    if(t.includes('›')) t=t.split('›').pop().trim();
    if(t.includes('>')) t=t.split('>').pop().trim();
    return t||'Sem subcategoria';
  }

  let rowsHtml='';
  DRE_STRUCT.forEach(row=>{
    const va=dreTotal[row.id]||0;
    const pct=recBruta?Math.abs(va)/recBruta*100:0;
    const mCols=mesesDisp.map(m=>{const v=dreM[m][row.id]||0;return`<td class="dv ${valCls(v)}">${v===0?'—':fmtN(v)}</td>`;}).join('');
    if(row.tipo==='g'){
      const cls=row.hi?'dre-hi':'dre-cat';
      rowsHtml+=`<tr class="${cls}"><td>${row.lbl}</td>${mCols}<td class="dv ${valCls(va)}">${fmtN(va)}</td><td class="dv dc">${pct.toFixed(1)}%</td></tr>`;
      const subRows=planRows.filter(pr=>pr._dre===row.id && Math.abs((planTotals[pr._key]||{}).total||0)>0).slice(0,120);
      subRows.forEach(pr=>{
        const pt=planTotals[pr._key]||{total:0,mes:{}};
        const sCols=mesesDisp.map(m=>{const v=pt.mes[m]||0;return`<td class="dv dc">${v?fmtN(v):'—'}</td>`;}).join('');
        rowsHtml+=`<tr class="dre-sub"><td>└ ${ccSafe(dreCleanSubLabel(pr.subcategoria||pr.categoria||'Sem subcategoria'))}</td>${sCols}<td class="dv dc">${fmtN(pt.total)}</td><td></td></tr>`;
      });
      const totalSub=planRows.filter(pr=>pr._dre===row.id && Math.abs((planTotals[pr._key]||{}).total||0)>0).length;
      if(totalSub>120) rowsHtml+=`<tr class="dre-sub"><td>└ + ${totalSub-120} subcategorias ocultas para manter a tela leve</td><td colspan="${colCnt-1}"></td></tr>`;
    }else{
      const cls=row.hi?'dre-hi':'dre-tot';
      rowsHtml+=`<tr class="${cls}"><td>${row.lbl}</td>${mCols}<td class="dv ${valCls(va)}">${fmtN(va)}</td><td class="dv dc">${pct.toFixed(1)}%</td></tr>`;
      rowsHtml+=`<tr class="dre-sep"><td colspan="${colCnt}"></td></tr>`;
    }
  });

  const margTotal=bkTotal.marg;
  const margCols=mesesDisp.map(m=>{const v=bkM[m].marg;return`<td class="dv ${v>=0?'dp':'dn'}">${v.toFixed(1)}%</td>`;}).join('');
  rowsHtml+=`<tr class="dre-bk"><td>📊 Margem de Lucro</td>${margCols}<td class="dv ${margTotal>=0?'dp':'dn'}">${margTotal.toFixed(1)}%</td><td></td></tr>`;
  const bepTotal=bkTotal.bep;
  const bepCols=mesesDisp.map(m=>{const v=bkM[m].bep;return`<td class="dv dc">${v!==null?fmt(v):'N/D'}</td>`;}).join('');
  rowsHtml+=`<tr class="dre-bk"><td>🎯 Breakeven</td>${bepCols}<td class="dv dc">${bepTotal!==null?fmt(bepTotal):'N/D'}</td><td></td></tr>`;
  const mcTot=bkTotal.mcPct;
  const mcCols=mesesDisp.map(m=>{const v=bkM[m].mcPct;return`<td class="dv dc">${v.toFixed(1)}%</td>`;}).join('');
  rowsHtml+=`<tr class="dre-bk"><td>📐 Margem de Contribuição</td>${mcCols}<td class="dv dc">${mcTot.toFixed(1)}%</td><td></td></tr>`;

  const yearBtns=anos.map(ano=>`<button class="m-tab${String(fAno)===String(ano)?' act':''}" onclick="setDreAno('${ccSafe(String(ano))}')">${ccSafe(String(ano))}</button>`).join('');
  content.innerHTML=`
    <div class="dre-page" data-versao="DRE-API-DESIGN-2026-06-06">
      <div class="dre-yearbar">${yearBtns}</div>
      <div class="dre-info">DRE ${ccSafe(fAno)} · Regime de Competência · ${lancAno.length} lançamentos · ${mesesDisp.length} meses</div>
      <div class="dre-table-shell">
        <table class="dre-t">
          <colgroup><col class="dre-col-item">${mesesDisp.map(()=>'<col class="dre-col-mes">').join('')}<col class="dre-col-total"><col class="dre-col-pct"></colgroup>
          <thead><tr><th style="text-align:left">Item</th>${thM}<th class="dv" style="color:var(--acc)">Total ${ccSafe(fAno)}</th><th class="dv">% Rec.</th></tr></thead>
          <tbody>${rowsHtml}</tbody>
        </table>
      </div>
    </div>`;
}
window.rDRE=rDRE;

function rVG(){
  const mes=selMes||new Date().toISOString().slice(0,7);
  const ano=mes.slice(0,4);
  const mesesAno=[...new Set(store.lancamentos.filter(r=>(r.data_competencia||'').startsWith(ano)).map(r=>(r.data_competencia||'').slice(0,7)).filter(Boolean))].sort();

  const linhas=mesesAno.map(m=>{
    const l=store.lancamentos.filter(r=>(r.data_competencia||'').startsWith(m));
    const receita=l.filter(r=>r.rec_desp==='Contas a receber').reduce((s,r)=>s+r.valor,0);
    const cv=l.filter(r=>r.categoria==='Custo dos produtos').reduce((s,r)=>s+r.valor,0);
    const cf=l.filter(r=>['Despesas Operacionais','Despesas com pessoal','Outras despesas operacionais'].includes(r.categoria)).reduce((s,r)=>s+r.valor,0);
    const mc=receita-cv;const mcPct=receita?mc/receita:0;
    const bep=mcPct>0?cf/mcPct:null;
    const resultado=receita-cv-cf-l.filter(r=>!['Custo dos produtos','Despesas Operacionais','Despesas com pessoal','Outras despesas operacionais'].includes(r.categoria)&&r.rec_desp!=='Contas a receber').reduce((s,r)=>s+r.valor,0);
    const clientes=store.clientes_mes[m]||0;
    const tm=clientes?receita/clientes:0;
    return{m,receita,cv,cf,mc,mcPct,bep,resultado,clientes,tm};
  });

  // KPIs do mês selecionado
  const atual=linhas.find(l=>l.m===mes)||linhas[linhas.length-1]||{};
  const totAno=linhas.reduce((s,l)=>s+l.receita,0);
  const bepMedia=linhas.filter(l=>l.bep).reduce((s,l)=>s+l.bep,0)/(linhas.filter(l=>l.bep).length||1);

  const inputsClientes=mesesAno.map(m=>{
    const l=linhas.find(x=>x.m===m)||{};
    return`<div class="input-row">
      <label>${mesLbl(m)}<span style="margin-left:8px;color:var(--tx3)">Receita: ${fmt(l.receita||0)}</span></label>
      <input class="clientes-input" data-mes="${m}" type="text" inputmode="numeric" autocomplete="off" value="${store.clientes_mes[m]||''}" placeholder="Nº clientes"
        oninput="clientesMesDigitado(this,'${m}')" onblur="clientesMesFechar('${m}',this)" onkeydown="if(event.key==='Enter'){this.blur()}">
    </div>`;
  }).join('');

  const tabelaRows=linhas.map(l=>{
    const diffBep=l.bep?l.receita-l.bep:null;
    return`<tr>
      <td>${mesLbl(l.m)}</td>
      <td class="tr vin">+ ${fmtN(l.receita)}</td>
      <td class="tr vout">− ${fmtN(l.cv)}</td>
      <td class="tr" style="color:var(--tx2)">− ${fmtN(l.cf)}</td>
      <td class="tr mono" style="color:var(--in)">${l.mcPct?(l.mcPct*100).toFixed(1)+'%':'—'}</td>
      <td class="tr mono" style="color:var(--acc)">${l.bep?fmt(l.bep):'N/D'}</td>
      <td class="tr" style="color:${diffBep===null?'var(--tx3)':diffBep>=0?'var(--ok)':'var(--er)'}">${diffBep!==null?(diffBep>=0?'+':'')+fmtN(diffBep):'—'}</td>
      <td class="tr mono" style="color:var(--pu)">${l.clientes||'—'}</td>
      <td class="tr mono" style="color:var(--acc)">${l.tm?fmt(l.tm):'—'}</td>
    </tr>`;
  }).join('');

  const maxBEP=Math.max(...linhas.filter(l=>l.bep).map(l=>Math.max(l.receita,l.bep)),1);
  const bepBars=linhas.filter(l=>l.receita||l.bep).map(l=>`<div class="chart-col">
    <div class="chart-area" style="position:relative;height:110px;align-items:flex-end;gap:2px">
      <div class="chart-b" style="height:${Math.round((l.receita/maxBEP)*100)}px;background:var(--ok)" title="Receita: ${fmt(l.receita)}"></div>
      ${l.bep?`<div class="chart-b" style="height:${Math.round((l.bep/maxBEP)*100)}px;background:var(--in);opacity:.7" title="BEP: ${fmt(l.bep)}"></div>`:''}
    </div>
    <div style="font-size:9px;color:var(--tx2)">${mesLbl(l.m)}</div>
  </div>`).join('');

  $('content').innerHTML=`
    <div class="kpis">
      <div class="kpi" style="--kc:var(--ok)"><div class="kpi-l">Receita — ${mesLbl(mes)}</div><div class="kpi-v">${fmt(atual.receita||0)}</div></div>
      <div class="kpi" style="--kc:var(--in)"><div class="kpi-l">Breakeven — ${mesLbl(mes)}</div><div class="kpi-v" style="color:var(--in)">${atual.bep?fmt(atual.bep):'N/D'}</div><div class="kpi-s">${atual.bep&&atual.receita?(atual.receita>=atual.bep?'✅ Atingido':'⚠️ '+fmt(atual.bep-atual.receita)+' a cobrir'):'—'}</div></div>
      <div class="kpi" style="--kc:var(--acc)"><div class="kpi-l">Ticket Médio — ${mesLbl(mes)}</div><div class="kpi-v" style="color:var(--acc)">${atual.tm?fmt(atual.tm):'Informe clientes'}</div><div class="kpi-s">${atual.clientes?atual.clientes+' clientes':'Informe ao lado →'}</div></div>
      <div class="kpi" style="--kc:var(--pu)"><div class="kpi-l">BEP Médio ${ano}</div><div class="kpi-v" style="color:var(--pu)">${fmt(bepMedia)}</div><div class="kpi-s">média ${mesesAno.length} meses</div></div>
    </div>

    <div style="display:grid;grid-template-columns:3fr 1fr;gap:12px;margin-bottom:12px">
      <div class="bi-card">
        <div class="sh">Receita vs Breakeven <span>${ano} — barras = mês</span></div>
        <div style="display:flex;align-items:flex-end;gap:4px;min-height:120px">${bepBars||'<span style="color:var(--tx3)">Sem dados</span>'}</div>
        <div style="display:flex;gap:12px;margin-top:7px;font-size:10px;color:var(--tx2)"><span><i style="display:inline-block;width:8px;height:8px;background:var(--ok);border-radius:2px;margin-right:3px"></i>Receita</span><span><i style="display:inline-block;width:8px;height:8px;background:var(--in);border-radius:2px;margin-right:3px"></i>Breakeven</span></div>
      </div>
      <div class="bi-card">
        <div class="sh">Clientes Atendidos <span>informe por mês</span></div>
        ${inputsClientes||'<span style="color:var(--tx3);font-size:12px">Sem meses</span>'}
      </div>
    </div>

    <div class="bi-card">
      <div class="sh">Análise Mensal ${ano} <span>BEP · Margem Contribuição · Ticket Médio</span></div>
      <div style="overflow-x:auto"><div class="tw" style="border:none"><table>
        <thead><tr>
          <th>Mês</th><th class="tr">Receita</th><th class="tr">Custo Var.</th><th class="tr">Custo Fix.</th>
          <th class="tr">MC%</th><th class="tr">Breakeven</th><th class="tr">Rec. − BEP</th>
          <th class="tr">Clientes</th><th class="tr">TM</th>
        </tr></thead>
        <tbody>${tabelaRows||'<tr><td colspan="9" style="text-align:center;color:var(--tx3);padding:20px">Sem dados</td></tr>'}</tbody>
      </table></div></div>
    </div>`;
}

let ccSel='';
function ccCats(){return ccGroups().map(g=>g.nome);}
function ccRows(cat){const g=ccGroupByAny(cat);return g?g.rows:[];}
function ccSubs(cat){return ccSubsByAny(cat);}
function ccLancCount(cat,sub=''){
  const g=ccGroupByAny(cat); const subObj=sub?ccSubByAny(g?.id||cat,sub):null;
  return (store.lancamentos||[]).filter(l=>{
    const gMatch=g?((l.categoria_id&&l.categoria_id===g.id)||ccNorm(l.categoria)===ccNorm(g.nome)):false;
    if(!sub)return gMatch;
    return gMatch && (subObj?((l.subcategoria_id&&l.subcategoria_id===ccRowSubId(subObj))||ccNorm(l.subcategoria)===ccNorm(subObj.subcategoria)):ccNorm(l.subcategoria)===ccNorm(sub));
  }).length;
}
function ccAgendaCount(cat,sub=''){
  const g=ccGroupByAny(cat); const subObj=sub?ccSubByAny(g?.id||cat,sub):null;
  return (store.agenda||[]).filter(a=>{
    const gMatch=g?((a.categoria_id&&a.categoria_id===g.id)||ccNorm(a.categoria)===ccNorm(g.nome)):false;
    if(!sub)return gMatch;
    return gMatch && (subObj?((a.subcategoria_id&&a.subcategoria_id===ccRowSubId(subObj))||ccNorm(a.subcategoria)===ccNorm(subObj.subcategoria)):ccNorm(a.subcategoria)===ccNorm(sub));
  }).length;
}
function ccSafe(v){return agEsc(v||'');}
function ccSortStore(){
  store.centrocusto=(store.centrocusto||[]).sort((a,b)=>{
    const c=(a.categoria||'').localeCompare((b.categoria||''),'pt-BR',{sensitivity:'base'});
    if(c)return c;
    const sa=(a.subcategoria||'').trim(), sb=(b.subcategoria||'').trim();
    if(!sa&&sb)return -1;
    if(sa&&!sb)return 1;
    return sa.localeCompare(sb,'pt-BR',{sensitivity:'base'});
  });
}
async function ccPersistRefs(changedLanc,changedAgenda){
  try{
    const jobs=[];
    changedLanc.forEach(r=>{if(r.id)jobs.push(fbSet('lancamentos',r.id,{...r}));});
    changedAgenda.forEach(r=>{if(r.id)jobs.push(fbSet('agenda_financeira',r.id,{...r}));});
    for(let i=0;i<jobs.length;i+=80){await Promise.all(jobs.slice(i,i+80));}
  }catch(e){console.warn('Falha ao atualizar referências do plano de contas:',e);}
}
async function ccRenameRefs(oldCat,newCat,oldSub=null,newSub=null,ids={}){
  const groupId=ids.groupId||''; const subId=ids.subId||'';
  const changedLanc=[],changedAgenda=[];
  const apply=(r,arr)=>{
    const gMatch=groupId?(r.categoria_id===groupId||ccNorm(r.categoria)===ccNorm(oldCat)):ccNorm(r.categoria)===ccNorm(oldCat);
    if(!gMatch)return;
    const sMatch=oldSub===null?true:(subId?(r.subcategoria_id===subId||ccNorm(r.subcategoria)===ccNorm(oldSub)):ccNorm(r.subcategoria)===ccNorm(oldSub));
    if(!sMatch)return;
    r.categoria=newCat; if(groupId)r.categoria_id=groupId;
    if(newSub!==null){r.subcategoria=newSub; if(subId)r.subcategoria_id=subId;}
    arr.push(r);
  };
  (store.lancamentos||[]).forEach(r=>apply(r,changedLanc));
  (store.agenda||[]).forEach(r=>apply(r,changedAgenda));
  await ccPersistRefs(changedLanc,changedAgenda);
}

function calcDep(r){if(!r.valor_aquisicao||!r.vida_util_anos)return{m:0,ac:0,at:+r.valor_aquisicao||0,pct:0};const mn=(+r.valor_aquisicao)/(+r.vida_util_anos*12);const s=r.data_aquisicao?new Date(r.data_aquisicao):new Date();const e=r.data_baixa?new Date(r.data_baixa):new Date();const ms=Math.max(0,(e.getFullYear()-s.getFullYear())*12+e.getMonth()-s.getMonth());const ac=Math.min(mn*ms,+r.valor_aquisicao);return{m:mn,ac,at:+r.valor_aquisicao-ac,pct:+r.valor_aquisicao?ac/+r.valor_aquisicao*100:0};}

// FLUXO DE CAIXA CORRENTE + AUDITORIA + BACKUP
// ══════════════════════════════════════════════
let fluxoMes=today().slice(0,7);
function fDate(d){return d?new Date(d+'T12:00:00'):null;}
function isDone(r){const s=String(r.status||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');return ['concluido','baixado','pago'].includes(s);}
function isReceber(r){return r.rec_desp==='Contas a receber'||r.tipo==='receber';}
function moneyInput(v){return Number(String(v||'').replace(/\./g,'').replace(',','.'))||0;}
function mesDias(mes){const y=+mes.slice(0,4),m=+mes.slice(5,7);return new Date(y,m,0).getDate();}
function addDia(data,n){const d=new Date(data+'T12:00:00');d.setDate(d.getDate()+n);return d.toISOString().slice(0,10);}
function fluxoItems(mes=fluxoMes){
  try{normalizeAgendaStore();}catch(_e){}
  // Fluxo diário: pagamentos vêm dos Lançamentos por vencimento.
  // Recebidos vêm somente da Agenda Financeira manual, para não misturar vendas brutas do fechamento mensal.
  const lanc=(store.lancamentos||[]).filter(r=>r.rec_desp!=='Contas a receber'&&(r.data_vencimento||r.data_competencia||'').startsWith(mes)).map(r=>({
    id:r.id,source:'lancamento',tipo:'pagar',data:r.data_vencimento||r.data_competencia,descricao:r.descricao||r.categoria||'Lançamento',valor:+r.valor||0,status:isDone(r)?'Baixado':'Aberto',categoria:r.categoria||'',subcategoria:r.subcategoria||'',origem:'Lançamentos'
  }));
  const man=(store.agenda||[]).filter(r=>(r.data||'').startsWith(mes)&&(r.tipo||'receber')!=='pagar').map(r=>({
    id:r.id,source:'manual',tipo:'receber',data:r.data,descricao:agOrigem(r)||'Recebimento manual',valor:+r.valor||0,status:'Baixado',categoria:r.categoria||'',subcategoria:r.subcategoria||'',origem:'Agenda Financeira'
  }));
  return [...lanc,...man].filter(x=>x.data).sort((a,b)=>(a.data||'').localeCompare(b.data||'')||(a.tipo||'').localeCompare(b.tipo||''));
}
function setFluxoMes(delta){fluxoMes=agAddMes(fluxoMes,delta);rFluxo();}
window.setFluxoMes=setFluxoMes;
window.fluxoHoje=function(){fluxoMes=today().slice(0,7);rFluxo();};

  const v=moneyInput(($('fx-saldo')||{}).value);
  store.cfg.saldoInicialMes=store.cfg.saldoInicialMes||{};
  store.cfg.saldoInicialMes[fluxoMes]=v;

  if(fbOk) try{await db.collection('config').doc('main').set({saldoInicialMes:store.cfg.saldoInicialMes},{merge:true});}catch(e){console.warn(e)}
};
function rFluxo(){
  const itens=fluxoItems(fluxoMes);
  const saldoInicial=+(store.cfg?.saldoInicialMes?.[fluxoMes]||0);
  const recebido=itens.filter(x=>x.tipo==='receber').reduce((s,x)=>s+x.valor,0);
  const pagPrev=itens.filter(x=>x.tipo==='pagar').reduce((s,x)=>s+x.valor,0);
  const pagReal=itens.filter(x=>x.tipo==='pagar'&&x.status==='Baixado').reduce((s,x)=>s+x.valor,0);
  const abertoPagar=itens.filter(x=>x.tipo==='pagar'&&x.status!=='Baixado').reduce((s,x)=>s+x.valor,0);
  const fim=saldoInicial+recebido-pagPrev;
  const realizado=saldoInicial+recebido-pagReal;
  const hj=today(); const ate7=addDia(hj,7);
  const vencidos=itens.filter(x=>x.tipo==='pagar'&&x.status!=='Baixado'&&x.data<hj).reduce((s,x)=>s+x.valor,0);
  const prox7=itens.filter(x=>x.status!=='Baixado'&&x.data>=hj&&x.data<=ate7);
  let saldo=saldoInicial, pior={data:fluxoMes+'-01',saldo:saldoInicial};
  let rows='';
  for(let d=1;d<=mesDias(fluxoMes);d++){
    const data=`${fluxoMes}-${String(d).padStart(2,'0')}`;
    const dia=itens.filter(x=>x.data===data);
    const recDia=dia.filter(x=>x.tipo==='receber').reduce((s,x)=>s+x.valor,0);
    const pagar=dia.filter(x=>x.tipo==='pagar').reduce((s,x)=>s+x.valor,0);
    const pago=dia.filter(x=>x.tipo==='pagar'&&x.status==='Baixado').reduce((s,x)=>s+x.valor,0);
    saldo+=recDia-pagar;
    if(saldo<pior.saldo)pior={data,saldo};
    const cls=saldo<0?'fx-row-bad':(recDia||pagar)?'fx-row-good':'';
    if(recDia||pagar||data===hj){
      rows+=`<tr class="${cls}"><td class="mono">${fmtD(data)}</td><td class="tr vin">${recDia?fmt(recDia):'—'}</td><td class="tr vout">${pagar?fmt(pagar):'—'}</td><td class="tr">${pago?fmt(pago):'—'}</td><td class="tr ${saldo>=0?'vin':'vout'}">${fmt(saldo)}</td><td>${dia.length?dia.length+' item(ns)':(data===hj?'Hoje':'')}</td></tr>`;
    }
  }
  $('content').innerHTML=`<div>
    <div class="fx-top">
      <div class="fx-card">
        <div class="fx-title">Fluxo de Caixa Corrente</div>
        <div class="fx-sub">Recebidos vêm da Agenda Financeira manual. Pagamentos vêm dos Lançamentos pela data de vencimento. As vendas brutas lançadas no fechamento do mês não entram neste fluxo diário.</div>

function auditoriaPlanoSet(){ccEnsureIds();return {ids:new Set((store.centrocusto||[]).filter(c=>c.subcategoria).map(c=>ccRowSubId(c)).filter(Boolean)),pairs:new Set((store.centrocusto||[]).filter(c=>c.categoria&&c.subcategoria).map(c=>(c.categoria+'|||'+c.subcategoria).toLowerCase()))};}
function auditoriaNoPlano(r,plano){if(r.subcategoria_id&&plano.ids.has(r.subcategoria_id))return true;return plano.pairs.has((r.categoria+'|||'+r.subcategoria).toLowerCase());}
function auditoriaItens(){
  const hoje=today(); const plano=auditoriaPlanoSet(); const out=[]; const dup={};
  (store.lancamentos||[]).forEach(r=>{
    const chave=[r.rec_desp,r.data_competencia,r.data_vencimento,Math.round((+r.valor||0)*100),String(r.descricao||'').trim().toLowerCase()].join('|');
    dup[chave]=(dup[chave]||[]).concat(r);
    const faltas=[];
    if(!r.data_competencia)faltas.push('competência'); if(!r.data_vencimento)faltas.push('vencimento'); if(!r.descricao)faltas.push('descrição'); if(!r.categoria)faltas.push('categoria'); if(!r.subcategoria)faltas.push('subcategoria'); if(!r.forma_pagamento)faltas.push('forma pgto'); if(!(+r.valor>0))faltas.push('valor');
    if(faltas.length) out.push({sev:'Alta',tipo:'Campos obrigatórios ausentes',msg:`${r.descricao||r.categoria||'Lançamento sem descrição'} está sem ${faltas.join(', ')}.`,meta:[fmt(r.valor),fmtD(r.data_vencimento),r.status||'—'],id:r.id,source:'lancamento'});
    if(r.categoria&&r.subcategoria&&!auditoriaNoPlano(r,plano)) out.push({sev:'Média',tipo:'Fora do plano de contas',msg:`${r.categoria} › ${r.subcategoria} não está cadastrado no Plano de Contas atual.`,meta:[r.descricao||'—',fmt(r.valor)],id:r.id,source:'lancamento'});
    if(r.categoria==='TRANSFERÊNCIA ENTRE CONTAS' && r.rec_desp==='Contas a receber') out.push({sev:'Alta',tipo:'Transferência tratada como venda',msg:'Transferência entre contas foi encontrada como Vendas. Ela fica fora da Receita Bruta do DRE, mas precisa ser conferida para não inflar análise de caixa.',meta:[r.descricao||'—',fmt(r.valor),fmtD(r.data_competencia)],id:r.id,source:'lancamento'});
    if(!isDone(r)&&r.data_vencimento&&r.data_vencimento<hoje) out.push({sev:'Alta',tipo:'Vencido em aberto',msg:`Pagamento/recebimento vencido em ${fmtD(r.data_vencimento)} ainda está aberto.`,meta:[r.rec_desp||'—',r.descricao||'—',fmt(r.valor)],id:r.id,source:'lancamento'});
    if(r.data_competencia&&r.data_vencimento){const dc=r.data_competencia.slice(0,7),dv=r.data_vencimento.slice(0,7); if(dc!==dv) out.push({sev:'Baixa',tipo:'Competência diferente do vencimento',msg:`Competência ${mesLbl(dc)} e vencimento ${mesLbl(dv)}. Está certo se for intencional, mas deve ser conferido.`,meta:[r.descricao||'—',fmt(r.valor)],id:r.id,source:'lancamento'});}
  });
  Object.values(dup).filter(a=>a.length>1).forEach(a=>out.push({sev:'Média',tipo:'Possível duplicidade',msg:`${a.length} lançamentos parecem iguais: ${a[0].descricao||a[0].categoria||'sem descrição'}.`,meta:[fmt(a[0].valor),fmtD(a[0].data_vencimento),'IDs internos ocultos'],id:a[0].id,source:'lancamento'}));
  (store.agenda||[]).forEach(r=>{ if(!r.data||!r.descricao||!(+r.valor>0)) out.push({sev:'Média',tipo:'Agenda manual incompleta',msg:`Item manual da agenda com data, descrição ou valor faltando.`,meta:[r.descricao||'—',fmt(r.valor),fmtD(r.data)],id:r.id,source:'agenda'}); });
  return out.sort((a,b)=>({Alta:0,Média:1,Baixa:2}[a.sev]-({Alta:0,Média:1,Baixa:2}[b.sev])));
}
function rAuditoria(){
  const all=auditoriaItens();
  const alt=all.filter(x=>x.sev==='Alta').length, med=all.filter(x=>x.sev==='Média').length, bai=all.filter(x=>x.sev==='Baixa').length;
  const tipoResumo=[...new Set(all.map(x=>x.tipo))].map(t=>[t,all.filter(x=>x.tipo===t).length]).sort((a,b)=>b[1]-a[1]);
  const rows=all.slice(0,220).map(x=>{
    const src=JSON.stringify(x.source||'lancamento');
    const xid=JSON.stringify(x.id||'');
    const acao=x.source==='agenda'?'Corrigir item da agenda':'Corrigir lançamento';
    const excluir=x.source==='lancamento'?`<button class="btn bd2 btn-s audit-open" onclick='event.stopPropagation();excluirAuditoriaLancamento(${xid})'>🗑️ Excluir lançamento</button>`:'';
    return `<div class="audit-item audit-click" onclick='corrigirAuditoria(${src},${xid})' title="Clique para abrir e corrigir"><h4>${x.sev==='Alta'?'🔴':x.sev==='Média'?'🟠':'🔵'} ${agEsc(x.tipo)} <span class="audit-chip ${x.sev==='Alta'?'bad':x.sev==='Média'?'warn':'ok'}">${x.sev}</span></h4><p>${agEsc(x.msg)}</p><div class="audit-meta">${(x.meta||[]).map(m=>`<span>${agEsc(m)}</span>`).join('')}</div><div class="audit-foot"><span class="audit-tip">Corrija o lançamento ou exclua quando não fizer sentido manter.</span><div style="display:flex;gap:6px;flex-wrap:wrap"><button class="btn bp btn-s audit-open" onclick='event.stopPropagation();corrigirAuditoria(${src},${xid})'>✏️ ${acao}</button>${excluir}</div></div></div>`;
  }).join('');
  $('content').innerHTML=`<div>
    <div class="audit-grid">
      <div class="audit-card"><div class="audit-title">Risco alto</div><div class="kpi-v" style="color:var(--er);font-size:22px">${alt}</div><div class="audit-sub">corrigir primeiro: vencidos, transferências, campos críticos</div></div>
      <div class="audit-card"><div class="audit-title">Risco médio</div><div class="kpi-v" style="color:var(--wa);font-size:22px">${med}</div><div class="audit-sub">plano de contas, possíveis duplicidades e agenda manual</div></div>
      <div class="audit-card"><div class="audit-title">Observações</div><div class="kpi-v" style="font-size:22px">${bai}</div><div class="audit-sub">pontos que podem estar corretos, mas merecem revisão</div></div>
      <div class="audit-card"><div class="audit-title">Base auditada</div><div class="audit-sub">${store.lancamentos.length} lançamentos · ${(store.centrocusto||[]).length} itens do plano · ${(store.agenda||[]).length} manuais da agenda</div><div style="margin-top:8px">${tipoResumo.slice(0,4).map(([t,n])=>`<span class="audit-chip">${agEsc(t)}: ${n}</span>`).join('')}</div></div>
    </div>
    <div class="tb" style="margin-bottom:12px"><button class="btn bs" onclick="rAuditoria()">↻ Reanalisar</button><button class="btn bp" onclick="exportarAuditoriaCSV()">⬇️ Exportar auditoria CSV</button><span style="font-size:11px;color:var(--tx2)">Mostrando até 220 apontamentos. Corrija os altos primeiro.</span></div>
    <div class="audit-list">${rows||'<div class="es"><div class="em">✅</div><h3>Nenhum problema crítico encontrado</h3><p>Mesmo assim, faça conciliação bancária antes de decisões finais.</p></div>'}</div>
  </div>`;
}
window.corrigirAuditoria=function(source,id){
  if(source==='agenda'){
    const r=(store.agenda||[]).find(x=>x.id===id);
    if(!r){toast('Item da agenda não encontrado. Reanalise a auditoria.','er');return;}
    eAgenda(id);
    return;
  }
  const r=(store.lancamentos||[]).find(x=>x.id===id);
  if(!r){toast('Lançamento não encontrado. Reanalise a auditoria.','er');return;}
  eL(id);
};
window.excluirAuditoriaLancamento=function(id){
  const r=(store.lancamentos||[]).find(x=>x.id===id);
  if(!r){toast('Lançamento não encontrado. Reanalise a auditoria.','er');return;}
  const resumo=[r.descricao||r.categoria||'Sem descrição',fmt(r.valor),fmtD(r.data_vencimento||r.data_competencia)].filter(Boolean).join(' · ');
  confirm_('Excluir lançamento',`Excluir definitivamente este lançamento?<br><br><strong>${agEsc(resumo)}</strong><br><br>Use esta opção para lançamentos sem valor, duplicados ou registros que não fazem sentido manter.`,async()=>{
    store.lancamentos=store.lancamentos.filter(x=>x.id!==id);
    rAuditoria();
    toast('Lançamento excluído. Auditoria reanalisada ✅','ok');
    try{await fbDel('lancamentos',id);lsSave();}catch(e){lsSave();}
  });
};

function baixarArquivo(nome,conteudo,tipo='application/json'){
  const blob=new Blob([conteudo],{type:tipo}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=nome; document.body.appendChild(a); a.click(); setTimeout(()=>{URL.revokeObjectURL(a.href);a.remove();},500);
}
function csvEscape(v){return '"'+String(v??'').replace(/"/g,'""')+'"';}
window.exportarBackupJSON=function(){
  ccEnsureIds();
  const data={versao:'financeiro_burger_backup_v1',exportado_em:new Date().toISOString(),store:{lancamentos:store.lancamentos,centrocusto:store.centrocusto,patrimonio:store.patrimonio,agenda:store.agenda,clientes_mes:store.clientes_mes,cfg:store.cfg}};

};
window.exportarLancamentosCSV=function(){
  ccEnsureIds();
  const cols=['id','rec_desp','data_competencia','data_vencimento','data_efetivacao','forma_pagamento','categoria_id','categoria','subcategoria_id','subcategoria','descricao','valor','status','centro_custo','instituicao'];
  const csv=[cols.join(';')].concat((store.lancamentos||[]).map(r=>cols.map(c=>csvEscape(r[c])).join(';'))).join('\n');

window.exportarAuditoriaCSV=function(){

  baixarArquivo(`auditoria_financeira_${today()}.csv`,csv,'text/csv;charset=utf-8'); toast('CSV da auditoria gerado','ok');
};
window.importarBackupJSON=function(){const inp=$('backup-file'); if(inp)inp.click();};
window.receberBackupArquivo=async function(el){
  const file=el.files&&el.files[0]; if(!file)return;
  const txt=await file.text(); let data=null; try{data=JSON.parse(txt);}catch(e){toast('Arquivo inválido','er');return;}
  if(!data.store||!data.store.lancamentos){toast('Backup não reconhecido','er');return;}
  confirm_('Importar backup JSON','Isso vai substituir a base atual no Firebase pelas informações do backup selecionado. Gere outro backup antes de continuar.',async()=>{
    const ok=prompt('Digite IMPORTAR para confirmar a substituição da base.'); if(ok!=='IMPORTAR'){toast('Importação cancelada','in');return;}
    if(!fbOk){Object.assign(store,data.store);lsSave();render(CM);toast('Backup aplicado localmente','ok');return;}
    const cols=['lancamentos','centrocusto','patrimonio','agenda_financeira','clientes_mes'];
    for(const col of cols){const snap=await db.collection(col).get(); for(let i=0;i<snap.docs.length;i+=450){const batch=db.batch();snap.docs.slice(i,i+450).forEach(d=>batch.delete(d.ref));await batch.commit();}}
    await fbBatch('lancamentos',(data.store.lancamentos||[])); await fbBatch('centrocusto',(data.store.centrocusto||[])); await fbBatch('patrimonio',(data.store.patrimonio||[])); await fbBatch('agenda_financeira',(data.store.agenda||[]));
    const batch=db.batch(); Object.entries(data.store.clientes_mes||{}).forEach(([k,v])=>batch.set(db.collection('clientes_mes').doc(k),{count:v})); await batch.commit();
    await db.collection('config').doc('main').set(data.store.cfg||{}, {merge:true}); await loadAll(); render(CM); toast('Backup importado','ok');
  });
};

// ══════════════════════════════════════════════
// AGENDA FINANCEIRA — recebimentos manuais + pagamentos automáticos dos lançamentos
// ══════════════════════════════════════════════
let agendaMes=today().slice(0,7);
let agHideBaixados=false;
const agTipoLbl=t=>t==='pagar'?'Pagamento':'Recebimento';
const agTipoClass=t=>t==='pagar'?'pag':'rec';
const agPagoLbl=t=>t==='pagar'?'Pago':'Recebido';
const agAbertoLbl=t=>t==='pagar'?'A pagar':'Recebido';
function agAddMes(m,delta){const d=new Date(m+'-01T12:00:00');d.setMonth(d.getMonth()+delta);return d.toISOString().slice(0,7);}
function agMesExtenso(m){const d=new Date(m+'-01T12:00:00');const s=d.toLocaleDateString('pt-BR',{month:'long',year:'numeric'});return s.charAt(0).toUpperCase()+s.slice(1);}
function agEsc(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function agLancData(r){return r.data_vencimento||r.data_competencia||r.data_efetivacao||'';}
function agSort(a,b){return (a.data||'').localeCompare(b.data||'') || (a.tipo||'').localeCompare(b.tipo||'') || (a.descricao||'').localeCompare(b.descricao||'');}
function agSum(arr,fn){return arr.filter(fn).reduce((s,x)=>s+(+x.valor||0),0);}
// HOTFIX_AGENDA_UNIQUE_KEY_DEFINITIVO_2026-06-24
// Regra definitiva: recebimento manual é ÚNICO por DATA + ORIGEM.
// Ex.: 2026-06-24 + Pix sempre grava no mesmo documento e substitui o valor anterior.
// Também normaliza dados antigos onde origem veio como "Manual" e forma/descrição eram Pix/Crédito/Débito/iFood.
function agNorm(v){return String(v||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().trim().replace(/\s+/g,' ');}
function agSlug(v){return agNorm(v).replace(/[^a-z0-9]+/g,'_').replace(/^_+|_+$/g,'')||'recebimento';}
function agDateKey(v){
  if(!v) return '';
  try{
    if(typeof v.toDate==='function') return v.toDate().toISOString().slice(0,10);
    if(typeof v.seconds==='number') return new Date(v.seconds*1000).toISOString().slice(0,10);
    if(v instanceof Date) return v.toISOString().slice(0,10);
  }catch(_e){}
  const s=String(v||'').trim();
  const iso=s.match(/^(\d{4})-(\d{2})-(\d{2})/); if(iso) return `${iso[1]}-${iso[2]}-${iso[3]}`;
  const br=s.match(/^(\d{2})\/(\d{2})\/(\d{4})/); if(br) return `${br[3]}-${br[2]}-${br[1]}`;
  return s.slice(0,10);
}
function agCanonOrigem(v){
  const n=agNorm(v).replace(/[^a-z0-9]+/g,' ').trim();
  if(!n || ['manual','agenda','agenda manual','recebimento manual','manual agenda'].includes(n)) return '';
  if(n.includes('ifood') || n.includes('i food')) return 'iFood';
  if(n.includes('pix')) return 'Pix';
  if(n.includes('credito') || n.includes('cartao credito') || n.includes('cartao de credito')) return 'Crédito';
  if(n.includes('debito') || n.includes('cartao debito') || n.includes('cartao de debito')) return 'Débito';
  return '';
}
function agOrigem(r){
  const vals=[r?.origem_canonica,r?.forma,r?.descricao,r?.origem,r?.canal,r?.meio,r?.tipo_recebimento,r?.forma_pagamento,r?.bandeira,r?.nome,r?.titulo];
  for(const v of vals){const c=agCanonOrigem(v);if(c)return c;}
  return vals.map(v=>String(v||'').trim()).find(v=>v && !['manual','agenda','recebimento manual'].includes(agNorm(v)))||'';
}
function agManualKey(r){
  if(!r) return '';
  if((r.tipo||'receber')==='pagar') return '';
  const data=agDateKey(r.data||r.data_recebimento||r.data_vencimento||r.dt)||'';
  const origem=agOrigem(r);
  const origemKey=agSlug(agCanonOrigem(origem)||origem);
  return data&&origemKey ? data+'|'+origemKey : '';
}
function agStableId(d){
  const key=agManualKey(d);
  const [data,origem]=key.split('|');
  return 'receb_'+String(data||d.data||'').replace(/[^0-9]/g,'')+'_'+agSlug(origem||d.origem||d.forma||d.descricao);
}
function agPrepareManual(raw){
  const r={...(raw||{})};
  if((r.tipo||'receber')!=='pagar'){
    const data=agDateKey(r.data||r.data_recebimento||r.data_vencimento||r.dt);
    const origem=agOrigem(r);
    r.tipo='receber';
    if(data) r.data=data;
    r.origem=origem;
    r.forma=origem;
    r.descricao=origem||'Recebimento manual';
    r.origem_canonica=origem;
    r.status=r.status||'Baixado';
    r.manual_key=agManualKey(r);
    r.source_type='agenda_manual';
  }
  return r;
}
function agDuplicateManualIds(key, keepId=''){
  return (store.agenda||[]).filter(x=>agManualKey(x)===key && x.id && x.id!==keepId).map(x=>x.id);
}
function agTs(r){
  const v=r?.updated_at||r?.atualizado_em||r?.criado_em||r?.created_at||'';
  if(v&&typeof v.toMillis==='function') return v.toMillis();
  if(v&&typeof v.seconds==='number') return v.seconds*1000;
  const t=Date.parse(v); return Number.isFinite(t)?t:0;
}
window.__agendaDuplicateIdsToDelete=window.__agendaDuplicateIdsToDelete||[];
function agDedupManualList(list, mes=''){
  const manuais=new Map();
  const dupIds=[];
  (list||[]).forEach((raw,idx)=>{
    if(!raw) return;
    if((raw.tipo||'receber')==='pagar') return;
    const r=agPrepareManual(raw);
    const data=agDateKey(r.data);
    if(mes && !String(data||'').startsWith(mes)) return;
    let key=agManualKey(r);
    if(!key && data){ key=data+'|'+agSlug(r.descricao||r.forma||r.origem||('recebimento_'+(r.id||idx))); }
    if(!key) return;
    r.data=data||r.data;
    r.manual_key=key;
    r.__agendaIdx=idx;
    const atual=manuais.get(key);
    const score=(agTs(r)||0)*100000+(idx+1);
    const scoreAtual=atual?((agTs(atual)||0)*100000+((atual.__agendaIdx||0)+1)):-1;
    if(!atual || score>=scoreAtual){
      if(atual&&atual.id&&atual.id!==r.id) dupIds.push(atual.id);
      manuais.set(key,r);
    }else{
      if(r.id&&(!atual||r.id!==atual.id)) dupIds.push(r.id);
    }
  });
  if(dupIds.length) window.__agendaDuplicateIdsToDelete=[...new Set([...(window.__agendaDuplicateIdsToDelete||[]),...dupIds])];
  return [...manuais.values()].map(r=>{const x={...r};delete x.__agendaIdx;return x;});
}
function normalizeAgendaStore(){
  const base=store.agenda||[];
  const outros=base.filter(raw=>(raw?.tipo||'receber')==='pagar');
  const manuais=agDedupManualList(base,'');
  store.agenda=[...outros,...manuais];
  return store.agenda;
}
async function agFirebaseDuplicateIds(item, keepId=''){
  const ids=new Set();
  if(!fbOk||!db||!item?.data) return [];
  const key=agManualKey(item);
  const scan=(snap)=>snap.docs.forEach(doc=>{
    const row=agPrepareManual({id:doc.id,...doc.data()});
    if(doc.id!==keepId && agManualKey(row)===key) ids.add(doc.id);
  });
  try{scan(await db.collection('agenda_financeira').get());}
  catch(e){
    try{scan(await db.collection('agenda_financeira').where('data','==',item.data).get());}catch(_e){}
    try{scan(await db.collection('agenda_financeira').where('manual_key','==',key).get());}catch(_e){}
  }
  return [...ids];
}
let agCleanupTimer=null;
function agScheduleFirebaseCleanup(){
  if(!fbOk||!db) return;
  clearTimeout(agCleanupTimer);
  agCleanupTimer=setTimeout(async()=>{
    const ids=[...new Set(window.__agendaDuplicateIdsToDelete||[])].filter(Boolean);
    window.__agendaDuplicateIdsToDelete=[];
    if(!ids.length) return;
    try{for(const id of ids){await fbDel('agenda_financeira',id);} console.log('Agenda: duplicidades antigas removidas:',ids.length);}catch(e){console.warn('Falha ao limpar duplicidades antigas da agenda:',e.message);}
  },700);
}
async function agPersistUniqueManual(raw, oldId=''){
  const now=new Date().toISOString();
  const item=agPrepareManual({...raw,atualizado_em:now,updated_at:now});
  item.criado_em=item.criado_em||now;
  const stableId=agStableId(item);
  item.id=stableId;
  item.manual_key=agManualKey(item);
  const key=item.manual_key;
  const localIds=new Set((store.agenda||[]).filter(x=>x.id && x.id!==stableId && (x.id===oldId || agManualKey(x)===key)).map(x=>x.id));
  store.agenda=(store.agenda||[]).filter(x=>x.id!==stableId && !localIds.has(x.id) && agManualKey(x)!==key);
  store.agenda.push(item);
  normalizeAgendaStore();
  lsSave();
  if(fbOk){
    await fbSet('agenda_financeira',stableId,{...item});
    const firebaseIds=await agFirebaseDuplicateIds(item,stableId);
    const apagar=[...new Set([...localIds,...firebaseIds,oldId].filter(id=>id&&id!==stableId))];
    for(const did of apagar){await fbDel('agenda_financeira',did);}
  }
  return item;
}
function agManualMesItems(mes=agendaMes){
  normalizeAgendaStore();
  agScheduleFirebaseCleanup();
  return agDedupManualList(store.agenda||[],mes).map(r=>({
    ...r,
    id:r.id,
    source:'manual',
    tipo:'receber',
    descricao:agOrigem(r)||'Recebimento manual',

function agLancMesItems(mes=agendaMes){
  return (store.lancamentos||[]).filter(r=>r.rec_desp!=='Contas a receber'&&agLancData(r).startsWith(mes)).map(r=>({

function agAllMesItems(mes=agendaMes){return [...agManualMesItems(mes),...agLancMesItems(mes)].sort(agSort);}
function agMesItems(){const all=agAllMesItems();return agHideBaixados?all.filter(x=>x.status!=='Baixado'):all;}

function getAgendaD(){
  const origemSel=(document.querySelector('input[name="ag-origem"]:checked')||{}).value||'';

  const d={

  d.manual_key=agManualKey(d);

window.svAgenda=async function(id){
  if(window.__agendaSaving){toast('Salvamento em andamento. Aguarde.','in');return;}
  const d=getAgendaD();
  if(!d.data||!d.origem||!d.valor){toast('Preencha data, origem e valor','er');return;}
  window.__agendaSaving=true;
  try{
    normalizeAgendaStore();
    const old=id?(store.agenda||[]).find(x=>x.id===id):null;
    const item=await agPersistUniqueManual({...old,...d},id||'');
    agendaMes=item.data.slice(0,7);
    cM();
    if(['agenda','fluxocaixa','visaogeral','dashboard','auditoria'].includes(CM)) safeRender(CM); else rAgenda();
    toast('Recebimento manual salvo sem duplicar ✅','ok');
  }catch(e){
    console.warn('Falha ao salvar agenda:',e.message);
    lsSave();
    toast('Salvo localmente. Firebase não confirmou agora.','in');
  }finally{
    window.__agendaSaving=false;
  }
};
window.dAgenda=function(id){
  const r=(store.agenda||[]).find(x=>x.id===id);if(!r)return;
  const item=agPrepareManual(r);
  const dia=item.data;
  const key=agManualKey(item);
  const ids=key?(store.agenda||[]).filter(x=>agManualKey(x)===key&&x.id).map(x=>x.id):[id];
  confirm_('Excluir item manual da agenda',`Excluir ${item.descricao||'este item'} de ${fmtD(item.data)}?${ids.length>1?' Também serão removidas '+ids.length+' duplicidades do mesmo dia/origem.':''}`,async()=>{
    store.agenda=(store.agenda||[]).filter(x=>!ids.includes(x.id));
    normalizeAgendaStore();
    lsSave();
    const refrescarAgenda=()=>{ if(['agenda','fluxocaixa','visaogeral','dashboard','auditoria'].includes(CM)) safeRender(CM); else rAgenda(); };
    refrescarAgenda();
    const restantes=agAllMesItems().filter(x=>x.data===dia).sort(agSort);
    if(restantes.length){ setTimeout(()=>verAgendaDia(dia),0); } else { cM(); }
    toast(ids.length>1?'Item e duplicidades excluídos ✅':'Item manual excluído','ok');
    try{
      const extra=await agFirebaseDuplicateIds(item,'');

      lsSave();
    }catch(e){lsSave();}
  });
};
