    <div><div class="mono" style="font-size:12px">${fmtD(x.data)}</div><div class="ag-muted">${MES_NM[+x.data.slice(5,7)-1]}</div></div>
    <div><div class="ag-item-title">${agEsc(x.descricao)}</div><div class="ag-item-sub"><span class="ag-pill ${agTipoClass(x.tipo)}">${agTipoLbl(x.tipo)}</span> <span style="color:var(--tx3)">${src}</span>${detalhe?' · '+agEsc(detalhe):''}</div></div>
    <div class="tr ${x.tipo==='pagar'?'vout':'vin'}">${x.tipo==='pagar'?'−':'+'} ${fmtN(x.valor)}</div>
    <div class="hide-sm"><span class="ag-pill ${x.status==='Baixado'?'done':'open'}">${x.status==='Baixado'?agPagoLbl(x.tipo):agAbertoLbl(x.tipo)}</span></div>
    <div class="ra hide-sm">${agActions(x)}</div>
  </div>`;
}
function agSection(title,sub,items,emptyIcon='📭'){
  const total=items.reduce((s,x)=>s+(+x.valor||0),0);
  return `<div class="ag-list" style="margin-top:12px">
    <div class="ag-list-head"><div class="sh" style="margin:0">${title} <span>${items.length} item(ns)</span></div><div class="ag-muted">Total: ${fmt(total)} ${sub?`· ${sub}`:''}</div></div>
    ${items.length?items.map(agRow).join(''):`<div class="es"><div class="em">${emptyIcon}</div><h3>Nenhum item</h3><p>Não há valores nesta seção para o mês selecionado.</p></div>`}
  </div>`;
}

window.verAgendaDia=function(data){
  normalizeAgendaStore();
  agScheduleFirebaseCleanup();
  const itens=agAllMesItems().filter(x=>x.data===data).sort(agSort);
  const rec=agSum(itens,x=>x.tipo!=='pagar');
  const pag=agSum(itens,x=>x.tipo==='pagar');
  const pago=agSum(itens,x=>x.tipo==='pagar'&&x.status==='Baixado');
  const aPagar=agSum(itens,x=>x.tipo==='pagar'&&x.status!=='Baixado');
  const aberto=itens.filter(x=>x.status!=='Baixado');
  const rows=itens.map(x=>`<div class="ag-detail-row">
    <div>
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:2px;flex-wrap:wrap"><span class="ag-pill ${agTipoClass(x.tipo)}">${agTipoLbl(x.tipo)}</span><span class="ag-pill ${x.source==='lancamento'?'open':'done'}">${x.source==='lancamento'?'Automático':'Manual'}</span><strong>${agEsc(x.descricao)}</strong></div>
      <div class="ag-muted">${agEsc([x.forma||'—',x.categoria||'',x.subcategoria||'',x.conta||'',x.obs||''].filter(Boolean).join(' · '))}</div>
    </div>
    <div class="tr ${x.tipo==='pagar'?'vout':'vin'}">${x.tipo==='pagar'?'−':'+'} ${fmtN(x.valor)}</div>
    <div><span class="ag-pill ${x.status==='Baixado'?'done':'open'}">${x.status==='Baixado'?agPagoLbl(x.tipo):agAbertoLbl(x.tipo)}</span></div>
    <div class="ra">${agActions(x)}</div>
  </div>`).join('');
  oM('Agenda de '+fmtD(data),`<div class="ag-day-detail">
    <div class="kpis" style="grid-template-columns:repeat(4,1fr);margin-bottom:2px">
      <div class="kpi" style="--kc:var(--ok)"><div class="kpi-l">Recebimento no dia</div><div class="kpi-v">${fmt(rec)}</div></div>
      <div class="kpi" style="--kc:var(--er)"><div class="kpi-l">Pagamento no dia</div><div class="kpi-v">${fmt(pag)}</div></div>
      <div class="kpi" style="--kc:var(--ok)"><div class="kpi-l">Pago no dia</div><div class="kpi-v">${fmt(pago)}</div></div>
      <div class="kpi" style="--kc:var(--wa)"><div class="kpi-l">A pagar no dia</div><div class="kpi-v" style="color:var(--wa)">${fmt(aPagar)}</div></div>
    </div>
    ${rows||'<div class="es"><div class="em">🗓️</div><h3>Sem valores nesse dia</h3><p>Inclua recebimento manual ou cadastre pagamentos em Lançamentos com vencimento nessa data.</p></div>'}
  </div>`, `<button class="btn bs" onclick="nAgenda('receber','${data}')">＋ Receber manual</button>${aberto.length?`<button class="btn bp" onclick="baixaAgendaDia('${data}')">✅ Baixar dia</button>`:''}<button class="btn bs" onclick="cM()">Fechar</button>`, true);
};

function rAgenda(){
  store.agenda=store.agenda||[];
  normalizeAgendaStore();
  agScheduleFirebaseCleanup();
  const todos=agAllMesItems();
  const itens=agMesItems();
  const rec=agSum(todos,x=>x.tipo!=='pagar');
  const pag=agSum(todos,x=>x.tipo==='pagar');
  const recAberto=agSum(todos,x=>x.tipo!=='pagar'&&x.status!=='Baixado');
  const recBaixado=agSum(todos,x=>x.tipo!=='pagar'&&x.status==='Baixado');
  const pagAberto=agSum(todos,x=>x.tipo==='pagar'&&x.status!=='Baixado');
  const pagBaixado=agSum(todos,x=>x.tipo==='pagar'&&x.status==='Baixado');
  const autoPag=agLancMesItems().filter(x=>x.tipo==='pagar').length;
  const manualCount=agManualMesItems().length;
  const y=+agendaMes.slice(0,4),m=+agendaMes.slice(5,7);
  const first=new Date(`${agendaMes}-01T12:00:00`);
  const lastDay=new Date(y,m,0).getDate();
  const pad=(first.getDay()+6)%7;
  const totalCells=Math.ceil((pad+lastDay)/7)*7;
  let cells='';
  for(let i=0;i<totalCells;i++){
    const dia=i-pad+1;
    if(dia<1||dia>lastDay){cells+='<div class="ag-day empty"></div>';continue;}
    const data=`${agendaMes}-${String(dia).padStart(2,'0')}`;
    const dsAll=todos.filter(x=>x.data===data);
    const ds=itens.filter(x=>x.data===data);
    const dr=ds.filter(x=>x.tipo!=='pagar');
    const dp=ds.filter(x=>x.tipo==='pagar');
    const drA=agSum(ds,x=>x.tipo!=='pagar'&&x.status!=='Baixado');
    const dpA=agSum(ds,x=>x.tipo==='pagar'&&x.status!=='Baixado');
    const dpB=agSum(ds,x=>x.tipo==='pagar'&&x.status==='Baixado');
    const recDia=agSum(ds,x=>x.tipo!=='pagar');
    const pagDia=agSum(ds,x=>x.tipo==='pagar');
    const saldoA=drA-dpA;
    const allDone=dsAll.length&&dsAll.every(x=>x.status==='Baixado');
    const cls=ds.length?(dr.length&&dp.length?'mix':dr.length?'rec':'pag'):'';
    cells+=`<div class="ag-day ${ds.length?'has':''} ${cls} ${allDone?'done':''} ${data===today()?'today':''}" onclick="verAgendaDia('${data}')">
      <div class="ag-num"><span>${dia}</span>${allDone?'<span class="ag-check">✓</span>':''}</div>
      ${ds.length?`<div class="ag-total ${saldoA>0?'pos':saldoA<0?'neg':'zero'}">${fmt(saldoA)}</div>
      <div class="ag-lines">
        ${recDia?`<div class="ag-line"><span>Recebimento</span><strong class="vin">${fmtN(recDia)}</strong></div>`:''}
        ${pagDia?`<div class="ag-line"><span>Pagamento</span><strong class="vout">${fmtN(pagDia)}</strong></div>`:''}
        ${dpA?`<div class="ag-line"><span>A pagar</span><strong class="vout">${fmtN(dpA)}</strong></div>`:''}
        ${dpB?`<div class="ag-line"><span>Pago</span><strong class="vin">${fmtN(dpB)}</strong></div>`:''}
      </div>`:'<div class="ag-muted" style="margin-top:auto">Clique para incluir</div>'}
    </div>`;
  }
  const aPagar=todos.filter(x=>x.tipo==='pagar'&&x.status!=='Baixado').sort(agSort);
  const pagos=todos.filter(x=>x.tipo==='pagar'&&x.status==='Baixado').sort(agSort);
  const recebimentos=todos.filter(x=>x.tipo!=='pagar').sort(agSort);

  $('content').innerHTML=`<div class="ag-shell">
    <div class="kpis" style="grid-template-columns:repeat(auto-fit,minmax(185px,1fr))">
      <div class="kpi" style="--kc:var(--ok)"><div class="kpi-l">Recebimento do mês</div><div class="kpi-v">${fmt(rec)}</div><div class="kpi-s">Recebido: ${fmt(recBaixado)} · Aberto: ${fmt(recAberto)}</div></div>
      <div class="kpi" style="--kc:var(--er)"><div class="kpi-l">Total pagamento do mês</div><div class="kpi-v">${fmt(pag)}</div><div class="kpi-s">Automático dos lançamentos: ${autoPag} item(ns)</div></div>
      <div class="kpi" style="--kc:var(--wa)"><div class="kpi-l">A pagar</div><div class="kpi-v" style="color:var(--wa)">${fmt(pagAberto)}</div><div class="kpi-s">Pendentes por vencimento</div></div>
      <div class="kpi" style="--kc:var(--ok)"><div class="kpi-l">Pago</div><div class="kpi-v">${fmt(pagBaixado)}</div><div class="kpi-s">Lançamentos concluídos + manuais baixados</div></div>
      <div class="kpi" style="--kc:${rec-pag>=0?'var(--ok)':'var(--er)'}"><div class="kpi-l">Saldo previsto</div><div class="kpi-v" style="color:${rec-pag>=0?'var(--ok)':'var(--er)'}">${fmt(rec-pag)}</div><div class="kpi-s">Recebimento − pagamento</div></div>
      <div class="kpi" style="--kc:${recAberto-pagAberto>=0?'var(--ok)':'var(--er)'}"><div class="kpi-l">Fluxo aberto</div><div class="kpi-v" style="color:${recAberto-pagAberto>=0?'var(--ok)':'var(--er)'}">${fmt(recAberto-pagAberto)}</div><div class="kpi-s">Receber aberto − pagar aberto</div></div>
    </div>
    <div class="ag-top">
      <div class="ag-title"><button class="ag-navbtn" onclick="agSetMes(-1)">‹</button><span>${agMesExtenso(agendaMes)}</span><button class="ag-navbtn" onclick="agSetMes(1)">›</button></div>
      <div class="ag-actions">
        <button class="btn bs" onclick="agHoje()">Hoje</button>
        <button class="btn bs" onclick="agToggleBaixados()">${agHideBaixados?'👁️ Mostrar pagos':'🙈 Ocultar pagos'}</button>
        <button class="btn bp" onclick="nAgenda('receber')">＋ Recebimento manual</button>
        <button class="btn bpu" onclick="limparAgendaMesBaixados()">🧹 Apagar baixados manuais</button>
        <button class="btn bd2" onclick="excluirAgendaMes()">🗑️ Excluir manuais do mês</button>
      </div>
    </div>
    <div style="font-size:11px;color:var(--tx2);margin:-6px 0 10px 2px">Pagamentos aparecem automaticamente pelos <strong>Lançamentos</strong> na <strong>data de vencimento</strong>. Recebimentos manuais ficam apenas na Agenda/Fluxo e não criam lançamento.</div>
    <div class="ag-cal">
      <div class="ag-week">${['SEG','TER','QUA','QUI','SEX','SÁB','DOM'].map(d=>`<div class="ag-dow">${d}</div>`).join('')}</div>
      <div class="ag-grid">${cells}</div>
      <div style="display:flex;gap:12px;flex-wrap:wrap;margin-top:10px;color:var(--tx2);font-size:11px">
        <span><i style="display:inline-block;width:10px;height:10px;border-radius:3px;background:rgba(34,197,94,.22);margin-right:5px"></i>Recebimentos</span>
        <span><i style="display:inline-block;width:10px;height:10px;border-radius:3px;background:rgba(239,68,68,.22);margin-right:5px"></i>Pagamentos</span>
        <span><i style="display:inline-block;width:10px;height:10px;border-radius:3px;border:2px solid var(--acc);margin-right:5px"></i>Hoje</span>
        <span>✅ todos os itens do dia baixados</span>
        <span>${manualCount} manual(is) no mês</span>
      </div>
    </div>
    ${agSection('A pagar do mês','pendente',aPagar,'⏳')}
    ${!agHideBaixados?agSection('Pagos no mês','já baixados',pagos,'✅'):''}
    ${agSection('Recebimentos do mês','recebimentos manuais',recebimentos,'💰')}
  </div>`;
}

window.render=function(m){
  try{
    CM=m;window.debouncR=()=>{clearTimeout(DT);DT=setTimeout(()=>render(m),230);};
    const contentEl=$('content');
    if(contentEl) contentEl.classList.toggle('dre-content', m==='dre');
    if(m==='visaogeral' && clienteInputAtivo()) return;
    buildMonthNav();
    const fn=({visaogeral:rVG,dashboard:rDash,lancamentos:rLanc,agenda:rAgenda,fluxocaixa:rFluxo,dre:rDRE,auditoria:rAuditoria,bi:rBI,centrocusto:rCC,patrimonio:rPat,config:rCfg}[m]||rVG);
    fn();
  }catch(e){
    console.error('Erro ao renderizar aba '+m, e);
    const c=$('content');
    if(c)c.innerHTML=`<div class="es"><div class="em">⚠️</div><h3>Erro ao abrir esta aba</h3><p>${ccSafe(e.message||e)}</p></div>`;
    toast('Erro ao abrir aba '+m+': '+(e.message||e),'er');
  }
};

// ── INIT ────────────────────────────────────────────────
(async function(){
  // Limpa caches antigos pesados/corrompidos e evita renderizar milhares de lançamentos antes do Firebase responder.
  try{ lsLoad(); }catch(e){ console.warn('Cache leve indisponível', e); }
  $('content').innerHTML=`<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--tx2);gap:8px"><div style="width:16px;height:16px;border:2px solid var(--bd);border-top-color:var(--acc);border-radius:50%;animation:spin .6s linear infinite"></div>Conectando Firebase…</div>`;

  const sdkOk = await ensureFirebaseScripts();
  if(!sdkOk){
    fbOk=false;
    setStatus('● Firebase SDK indisponível','var(--wa)');
  } else {
    initFirebase();
  }
  if(fbOk){
    try{
      const ok = await Promise.race([
        loadAll(),
        new Promise(resolve=>setTimeout(()=>resolve(false),12000))
      ]);
      if(ok){
        render(CM||'visaogeral');
        return;
      }
      setStatus('● Firebase demorou','var(--wa)');
    }catch(e){
      setStatus('● offline','var(--er)');
      console.warn('Falha no carregamento inicial:', e);
    }
  } else {
    setStatus('● local (sem Firebase)','var(--wa)');
  }

  if(!(store.lancamentos||[]).length){
    $('content').innerHTML=`<div class="es"><div class="em">⚠️</div><h3>Firebase ainda não carregou</h3><p>O sistema abriu sem travar, mas ainda não recebeu os lançamentos. Aguarde alguns segundos e recarregue se necessário.</p></div>`;
    return;
  }
  render(CM||'visaogeral');
})();
</script>
